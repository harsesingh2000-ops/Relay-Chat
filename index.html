  var hw=["bhai","haan","nahi","nhi","kya","kahan","theek","hai","hain","ho","karo","kaise","pakka","baje","acha","accha","bahut","badiya","kal","kalh","aaj","bro","yaar","milte","chalte","raha","rahi","rahe","hoon","hu","dekho","bolo","suno","bhej","kar","mein","pe","se","ko","main","tera","mera","ghar","khana","kha","ja","aa","ruk","chal","sab","btao","batao","rehte","rahte","abhi","baad","jaldi","kidhar","bta","bata","rha","krta","bohot","achha","mast","aaoge","jaana","rahi","karte","liye","chahiye","aao","aana","gayi","gaye","aayi","utha","piyoge","sone","sona","neend","jaa","jaao","padh","khel","baith","utho","socho","bhool","yaad","dhundo","khol","bech","bhuka","pyaasa","taiyaar","shuru","khatam","poora","mehnga","sasta","mushkil","aasan","dawai","bukhar","tabiyat","dard","ache","acche","tm","tum","hum","waha","yaha","naya","purana","chalo","bilkul"];
  var words=text.toLowerCase().replace(/[^a-z\s]/g,"").split(/\s+/).filter(Boolean);
  var c=0;words.forEach(function(w){if(hw.indexOf(w)>=0)c++});
  if(c>=2||(words.length<=4&&c>=1))return "hi";
  return "en";
}

function norm(t){return t.trim().toLowerCase().replace(/[\u{1F000}-\u{1FFFF}]/gu,"").replace(/[!?.,:;'"()\-]+/g," ").replace(/\s+/g," ").trim()}

// ══════ HYBRID TRANSLATION — MyMemory API (free, unlimited) + Local fallback ══════
// MyMemory: free, no API key, 5000 chars/day anonymous, unlimited with email
var MYMEMORY_URL="https://api.mymemory.translated.net/get";

// Language code mapping for MyMemory (uses ISO codes)
var langCodeMap={en:"en-GB",hi:"hi-IN",es:"es-ES",fr:"fr-FR",ar:"ar-SA",ja:"ja-JP",zh:"zh-CN",de:"de-DE",pt:"pt-BR",ko:"ko-KR"};
function mmCode(c){return langCodeMap[c]||c}

// ASYNC API translation — works on deployed sites, free, no key
async function apiTranslate(text,fromCode,toCode){
  try{
    var url=MYMEMORY_URL+"?q="+encodeURIComponent(text)+"&langpair="+mmCode(fromCode)+"|"+mmCode(toCode);
    var res=await fetch(url);
    var data=await res.json();
    if(data.responseStatus===200&&data.responseData&&data.responseData.translatedText){
      var t=data.responseData.translatedText;
      // MyMemory sometimes returns UNTRANSLATED or same text
      if(t&&t.toLowerCase()!==text.toLowerCase()&&!t.includes("UNTRANSLATED"))return t;
    }
    return null;
  }catch(e){return null}
}

// LOCAL sync translation (offline fallback) — uses phrase dict + word map
function translateLocal(text,targetCode){
  var src=detectLang(text);
  if(src===targetCode){targetCode=src==="en"?"hi":"en"}
  var n=norm(text);

  function lookup(dict,query){
    if(dict[query])return dict[query];
    var keys=Object.keys(dict);
    for(var i=0;i<keys.length;i++){if(norm(keys[i])===query)return dict[keys[i]]}
    return null;
  }

  if(src==="hi"&&targetCode==="en"){
    var exact=lookup(hiEn,n);
    if(exact)return exact;
    var prefixes=["aur ","bhai ","haan ","toh ","chalo ","oye ","arre ","sun ","dekh "];
    for(var p=0;p<prefixes.length;p++){if(n.indexOf(prefixes[p])===0){var sub=n.slice(prefixes[p].length);var m=lookup(hiEn,sub);if(m)return m}}
    var bestKey="",bestScore=0;var nWords=n.split(" ");
    Object.keys(hiEn).forEach(function(key){var kn=norm(key);var kWords=kn.split(" ");var match=0;nWords.forEach(function(w){if(kWords.indexOf(w)>=0)match++});var score=match/Math.max(nWords.length,kWords.length);if(score>bestScore&&score>=0.6){bestScore=score;bestKey=key}});
    if(bestKey)return hiEn[bestKey];
    var words=text.trim().split(/\s+/);var translated=[];
    words.forEach(function(w){var cl=w.toLowerCase().replace(/[^a-z]/g,"");var mapped=wm[cl];if(mapped&&mapped.length>0){translated.push(mapped)}else if(mapped===""){}else{translated.push(w)}});
    var r=translated.join(" ");r=r.charAt(0).toUpperCase()+r.slice(1);
    if(r.toLowerCase()!==text.trim().toLowerCase())return r;
    return null;
  }
  if(src==="en"&&targetCode==="hi"){
    var exact2=lookup(enHi,n);if(exact2)return exact2;
    var ep=["hey ","hi ","and ","so ","well "];
    for(var e=0;e<ep.length;e++){if(n.indexOf(ep[e])===0){var es=n.slice(ep[e].length);var m2=lookup(enHi,es);if(m2)return m2}}
    var bk2="",bs2=0;var nw2=n.split(" ");
    Object.keys(enHi).forEach(function(key){var kn=norm(key);var kw=kn.split(" ");var mt=0;nw2.forEach(function(w){if(kw.indexOf(w)>=0)mt++});var sc=mt/Math.max(nw2.length,kw.length);if(sc>bs2&&sc>=0.7){bs2=sc;bk2=key}});
    if(bk2)return enHi[bk2];
    return null;
  }
  return null;
}

// MAIN translate: tries local first (instant), then API (async callback)
function translateText(text,targetCode,callback){
  var src=detectLang(text);
  if(src===targetCode){src=src==="en"?"hi":"en"}
  // Try local first
  var local=translateLocal(text,targetCode);
  if(local){
    if(callback)callback(local);
    return local;
  }
  // No local match — use API async
  if(callback&&navigator.onLine){
    apiTranslate(text,src,targetCode).then(function(result){
      callback(result||text);
    });
  }
  return "⏳ translating...";
}

// ══════ CHAT VIEW ══════
function ChatView({contact,myLang,netMode,translateSettings,onSetTranslate,onBack}){
  var[msg,setMsg]=useState("");
  var[msgs,setMsgs]=useState([]);
  var[typing,setTyping]=useState(false);
  var[showTPanel,setShowTPanel]=useState(false);
  var ref=useRef(null);
  var idRef=useRef(0);
  var isForeign=contact.region!=="in";
  var cantSend=netMode!=="online"&&isForeign;
  // Per-contact RECEIVE translation (their msgs → my lang)
  var ts=translateSettings[contact.id]||{enabled:false,fromLang:contact.lang};
  var tOn=ts.enabled;
  var fromLang=ts.fromLang;
  // Per-contact SEND translation (my msgs → their lang)
  var[sendT,setSendT]=useState({enabled:false,toLang:contact.lang});
  var[showSendPanel,setShowSendPanel]=useState(false);
  var sOn=sendT.enabled;
  var toLang=sendT.toLang;
  var myL=GL(myLang),thL=GL(fromLang),sendL=GL(toLang);
  var nid=function(){return ++idRef.current};

  function toggleTranslate(){
    onSetTranslate(contact.id,{enabled:!tOn,fromLang:fromLang});
    setShowTPanel(false);
  }
  function changeFromLang(code){
    onSetTranslate(contact.id,{enabled:true,fromLang:code});
    setShowTPanel(false);
  }
  function toggleSendTranslate(){
    setSendT({enabled:!sOn,toLang:toLang});
    setShowSendPanel(false);
  }
  function changeSendLang(code){
    setSendT({enabled:true,toLang:code});
    setShowSendPanel(false);
  }

  // buildMsg with async API support
  // MY msg: sOn OFF → single layer | sOn ON → translate to their lang (async)
  // THEIR msg: tOn OFF → single layer | tOn ON → translate to my lang (async)
  function buildMsg(original,from,time,status){
    var isMe=from==="me";
    var mid=nid();
    if(isMe){
      if(!sOn){
        return {id:mid,from:from,time:time,status:status,original:original,top:original,origLabel:"",origFlag:""};
      }
      // Send translate ON — instant try, then API update
      var localResult=translateText(original,toLang,function(apiResult){
        setMsgs(function(prev){return prev.map(function(m){return m.id===mid?Object.assign({},m,{top:apiResult}):m})});
      });
      return {id:mid,from:from,time:time,status:status,original:original,top:localResult,origLabel:"YOU TYPED",origFlag:myL.flag};
    }
    if(!tOn){
      return {id:mid,from:from,time:time,status:status,original:original,top:original,origLabel:"",origFlag:""};
    }
    // THEIR msg + translate ON — instant try, then API update
    var localResult2=translateText(original,myLang,function(apiResult2){
      setMsgs(function(prev){return prev.map(function(m){return m.id===mid?Object.assign({},m,{top:apiResult2}):m})});
    });
    return {id:mid,from:from,time:time,status:status,original:original,top:localResult2,origLabel:"ORIGINAL",origFlag:GL(fromLang).flag};
  }

  useEffect(function(){
    idRef.current=0;
    setMsgs([
      buildMsg("Bhai kal milte hain pakka!","them","2:20 PM"),
      buildMsg("Haan bro, pakka! 6 baje chalte hain","me","2:22 PM","read"),
      buildMsg("Sahi hai 🔥 Main bike se aaunga","them","2:25 PM"),
      buildMsg("Theek hai, metro pe mil jaayenge","me","2:28 PM","delivered"),
      buildMsg("Done! Aur project ka kya hua?","them","2:30 PM")
    ]);
  },[myLang,fromLang,tOn]);

  useEffect(function(){if(ref.current)ref.current.scrollIntoView({behavior:"smooth"})},[msgs,typing]);

  var send=function(){
    if(!msg.trim())return;
    var now=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
    var m=buildMsg(msg.trim(),"me",now,cantSend?"queued":"sent");
    setMsgs(function(p){return p.concat([m])});
    setMsg("");
    if(cantSend)return; // No auto-reply when queued
    setTyping(true);
    setTimeout(function(){
      setTyping(false);
      var sent=msg.trim().toLowerCase();
      // PRE-PAIRED replies — Hindi + English together, NO translation needed
      var pairs={
        sleep:[{hi:"Acha theek hai, good night bhai! Kal baat karte hain",en:"Good night! Talk to you tomorrow then"},{hi:"Haan bhai so jaa, bohot raat ho gayi",en:"Yeah go to sleep, it's really late"},{hi:"Good night bro! Subah msg karna",en:"Good night bro! Text me in the morning"}],
        food:[{hi:"Haan bhai khana kha lo, main bhi abhi khaunga",en:"Yeah go eat! I'm about to have dinner too"},{hi:"Kya kha rahe ho? Mujhe bhi bhook lag rhi hai",en:"What are you eating? I'm hungry too"},{hi:"Maine abhi pizza order kiya, tu bhi mangwa le",en:"I just ordered pizza, you should order too"}],
        greet:[{hi:"Main theek hoon bhai! Tu bata, kya chal raha hai?",en:"I'm doing great brother! What about you, what's up?"},{hi:"Sab badiya hai yaar! Tu suna, kaisa hai tu?",en:"Everything's good dude! Tell me, how are you?"},{hi:"Bas chal raha hai bhai, tu bata kya scene hai?",en:"Just going on brother, what's the scene?"}],
        meet:[{hi:"Haan pakka bhai! Time aur jagah fix karte hain",en:"Sure! Let's fix the time and place"},{hi:"Done bhai! Main free hoon, bata kab milna hai",en:"Done bro! I'm free, tell me when to meet"},{hi:"Bohot din ho gaye milke, pakka aana is baar",en:"It's been so long, definitely come this time"}],
        location:[{hi:"Main ghar pe hoon bhai, tu bata kya hua?",en:"I'm at home brother, what happened?"},{hi:"Abhi office mein hoon, shaam ko free hounga",en:"At office right now, will be free in the evening"},{hi:"Delhi mein hoon bhai, tu kidhar hai?",en:"I'm in Delhi brother, where are you?"}],
        busy:[{hi:"Acha theek hai bhai, baad mein baat karte hain",en:"Alright, let's catch up later then"},{hi:"Koi nahi bhai, jab free ho tab call karna",en:"No worries bro, call me when you're free"},{hi:"Haan samajh raha hoon, apna kaam kar tu",en:"Yeah I understand, you focus on your work"}],
        bye:[{hi:"Acha bhai bye! Take care, phir milte hain",en:"Bye! Take care, talk soon!"},{hi:"Bye bro! Apna khayal rakh",en:"Bye bro! Take care of yourself"},{hi:"Chal phir milte hain, good night!",en:"See you later, good night!"}],
        sorry:[{hi:"Arre koi baat nahi bhai, tension mat le",en:"No worries at all, don't stress about it!"},{hi:"Chal chod yaar, hota hai kabhi kabhi",en:"Forget it dude, it happens sometimes"},{hi:"Sorry ki kya zaroorat, sab theek hai",en:"No need to say sorry, everything's fine"}],
        thanks:[{hi:"Arre bhai thanks ki kya zaroorat, apne hain!",en:"No need to thank me, that's what friends are for!"},{hi:"Mention not bhai, kabhi bhi bol dena",en:"Don't mention it bro, just let me know anytime"},{hi:"Koi baat nahi yaar, tere liye toh kuch bhi",en:"No worries dude, anything for you"}]
      };
      var randoms=[
        {hi:"Haan bhai sahi kaha!",en:"Yeah bro, well said!"},{hi:"Bilkul sahi baat hai",en:"That's absolutely right"},
        {hi:"Acha acha batao phir",en:"Okay okay, tell me more"},{hi:"Wah bhai wah! Kya baat hai",en:"Wow brother wow! Amazing!"},
        {hi:"Sahi hai yaar, agree karta hoon",en:"That's right dude, I agree"},{hi:"Hmm samajh gaya, phir kya karna hai?",en:"Got it, so what's the plan?"},
        {hi:"Haan bhai sun raha hoon, bol",en:"Yeah brother I'm listening, go on"},{hi:"Pakka bhai! Main ready hoon",en:"Sure brother! I'm ready"},
        {hi:"Haha bohot funny hai yaar tu",en:"Haha you're so funny dude"},{hi:"Arey wah! Ye toh mast news hai",en:"Oh wow! That's awesome news"},
        {hi:"Sach mein? Bohot acha laga sunke!",en:"Really? So happy to hear that!"},{hi:"Dekh lenge bhai, kuch ho jayega",en:"We'll figure it out brother"},
        {hi:"Tu fikar mat kar, sab sahi hoga",en:"Don't worry, everything will be fine"},{hi:"Bhai ye toh top class hai!",en:"Brother this is top class!"},
        {hi:"Main bhi wohi soch raha tha",en:"I was thinking the same thing"},{hi:"Arre yaar tension mat le",en:"Hey dude don't stress"},
        {hi:"Bohot badhiya bhai!",en:"That's great brother!"},{hi:"Chal theek hai done!",en:"Alright fine, done!"},
        {hi:"Bhai tu best hai!",en:"Brother you're the best!"},{hi:"Suno ek baat batao mujhe",en:"Tell me one thing"}
      ];
      // Pick based on context
      var pair;
      if(/sone|neend|sleep|raat|good night|so ja/.test(sent)){pair=pick(pairs.sleep)}
      else if(/khana|kha|bhuka|hungry|eat|pizza|food/.test(sent)){pair=pick(pairs.food)}
      else if(/kaise|haal|how are|kaisa|kaisi|btao/.test(sent)){pair=pick(pairs.greet)}
      else if(/milte|milna|meet|plan/.test(sent)){pair=pick(pairs.meet)}
      else if(/kahan|kidhar|where|rahte|rehte/.test(sent)){pair=pick(pairs.location)}
      else if(/busy|kaam|work|office|meeting/.test(sent)){pair=pick(pairs.busy)}
      else if(/bye|chalta|alvida|tata/.test(sent)){pair=pick(pairs.bye)}
      else if(/sorry|maaf|galti/.test(sent)){pair=pick(pairs.sorry)}
      else if(/thanks|shukriya|dhanyawad/.test(sent)){pair=pick(pairs.thanks)}
      else{pair=pick(randoms)}
      function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
      var rt=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
      var rm;
      if(!tOn){
        // No translation — just show reply as-is
        var replyText=pair.en||pair.hi;
        rm={id:nid(),from:"them",time:rt,original:replyText,top:replyText,origLabel:"",origFlag:""};
      }else{
        // Translation ON — TOP = my language, BOTTOM = their original
        var myVersion=myLang==="hi"?pair.hi:pair.en;
        var theirVersion=myLang==="hi"?pair.en:pair.hi;
        rm={id:nid(),from:"them",time:rt,original:theirVersion,top:myVersion,origLabel:"ORIGINAL",origFlag:GL(fromLang).flag};
      }
      setMsgs(function(p){return p.concat([rm])});
    },2000);
  };

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <SBar netMode={netMode}/>
      {/* Chat Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px 10px",borderBottom:"1px solid "+C.border,background:C.surface}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",padding:4}}>{I.back}</button>
        <Av name={contact.name} initials={contact.av} size={40} online={contact.online}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:F,fontWeight:700,fontSize:16,color:C.text}}>{contact.name}</div>
          <div style={{fontFamily:FM,fontSize:10,color:cantSend?"#ff9f1a":contact.online?"#2ed573":C.textMuted}}>{cantSend?"⏳ queued · sends when online":contact.online?"online":"last seen 5m ago"}</div>
        </div>
        {/* Translate Toggle */}
        <button onClick={function(){if(tOn){toggleTranslate()}else{setShowTPanel(!showTPanel)}}} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:tOn?C.accentGlow:C.card,borderRadius:16,border:"1px solid "+(tOn?"rgba(0,229,160,0.25)":C.border),cursor:"pointer"}}>
          <span style={{fontSize:12}}>{I.translate}</span>
          <span style={{fontFamily:FM,fontSize:9,color:tOn?C.accent:C.textMuted,letterSpacing:0.5}}>{tOn?myL.flag+" "+myL.name:"Translate"}</span>
        </button>
      </div>
      {/* Translation Active Bar */}
      {tOn&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"6px 10px",background:"linear-gradient(90deg,transparent,"+C.accentGlow+",transparent)"}}>
        <span style={{fontFamily:F,fontSize:11,color:C.accent}}>{contact.name.split(" ")[0]}'s messages → {myL.name} {myL.flag}</span>
        <button onClick={function(){setShowTPanel(true)}} style={{background:"none",border:"none",color:C.textDim,cursor:"pointer",fontSize:10}}>✏️</button>
      </div>}
      {/* Translation Setup Panel — SIMPLE */}
      {showTPanel&&<div style={{padding:"14px 16px",background:C.card,borderBottom:"1px solid "+C.border,animation:"su 0.2s ease"}}>
        <div style={{fontFamily:F,fontSize:14,fontWeight:600,color:C.text,marginBottom:12}}>Translate {contact.name.split(" ")[0]}'s messages in:</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {langs.map(function(l){var sel=fromLang===l.code&&tOn;return (
            <button key={l.code} onClick={function(){changeFromLang(l.code)}} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",borderRadius:12,border:"1px solid "+(sel?C.accent+"44":C.border),background:sel?C.accentGlow:C.surface,cursor:"pointer"}}>
              <span style={{fontSize:16}}>{l.flag}</span>
              <span style={{fontFamily:F,fontSize:13,fontWeight:sel?600:400,color:sel?C.accent:C.text}}>{l.name}</span>
            </button>
          )})}
        </div>
        {tOn&&<button onClick={toggleTranslate} style={{marginTop:12,padding:"8px 16px",borderRadius:10,background:"rgba(255,59,92,0.08)",border:"1px solid rgba(255,59,92,0.2)",color:"#ff3b5c",fontFamily:F,fontSize:12,fontWeight:600,cursor:"pointer"}}>Stop translating</button>}
      </div>}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px",display:"flex",flexDirection:"column",gap:8}}>
        {msgs.map(function(m){return (<Bub key={m.id} msg={m}/>)})}
        {typing&&<div style={{alignSelf:"flex-start",background:C.msgIn,padding:"10px 16px",borderRadius:"16px 16px 16px 4px"}}><Dots/></div>}
        <div ref={ref}/>
      </div>
      <div style={{background:C.surface,borderTop:"1px solid "+C.border}}>
        {cantSend&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px",background:"rgba(255,159,26,0.06)"}}>
          <span style={{fontSize:12}}>⏳</span>
          <span style={{fontFamily:FM,fontSize:9,color:"#ff9f1a",letterSpacing:0.5}}>Messages will send when internet returns</span>
        </div>}
        {/* SEND Translate Toggle */}
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 16px 2px"}}>
          <button onClick={function(){if(sOn){toggleSendTranslate()}else{setShowSendPanel(!showSendPanel)}}} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",background:sOn?C.accentGlow:C.card,borderRadius:12,border:"1px solid "+(sOn?"rgba(0,229,160,0.25)":C.border),cursor:"pointer"}}>
            <span style={{fontSize:10}}>{I.translate}</span>
            <span style={{fontFamily:F,fontSize:11,color:sOn?C.accent:C.textMuted}}>{sOn?"Send as "+sendL.name+" "+sendL.flag:"Translate"}</span>
          </button>
          {sOn&&<span style={{fontFamily:F,fontSize:10,color:C.textDim}}>Your message → {sendL.flag} {sendL.name}</span>}
        </div>
        {/* Send Language Picker */}
        {showSendPanel&&<div style={{padding:"8px 16px 6px",animation:"su 0.2s ease"}}>
          <div style={{fontFamily:F,fontSize:13,fontWeight:600,color:C.text,marginBottom:8}}>Send my messages in:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {langs.map(function(l){var sel=toLang===l.code&&sOn;return (
              <button key={l.code} onClick={function(){changeSendLang(l.code)}} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 10px",borderRadius:10,border:"1px solid "+(sel?C.accent+"44":C.border),background:sel?C.accentGlow:C.card,cursor:"pointer"}}>
                <span style={{fontSize:14}}>{l.flag}</span>
                <span style={{fontFamily:F,fontSize:12,color:sel?C.accent:C.text}}>{l.name}</span>
              </button>
            )})}
          </div>
          {sOn&&<button onClick={toggleSendTranslate} style={{marginTop:6,padding:"5px 12px",borderRadius:8,background:"rgba(255,59,92,0.08)",border:"1px solid rgba(255,59,92,0.15)",color:"#ff3b5c",fontFamily:F,fontSize:11,cursor:"pointer"}}>Stop</button>}
        </div>}
        <div style={{padding:"6px 14px 16px",display:"flex",alignItems:"flex-end",gap:10}}>
          <button style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",padding:4}}>{I.emoji}</button>
          <div style={{flex:1,background:C.card,borderRadius:24,padding:"11px 16px",display:"flex",alignItems:"center",gap:8,border:"1px solid "+(cantSend?"rgba(255,159,26,0.2)":sOn?"rgba(0,229,160,0.2)":C.border)}}>
            <input value={msg} onChange={function(e){setMsg(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")send()}} placeholder={cantSend?"Type — will send when online...":sOn?"Type in "+myL.name+" → sends as "+sendL.name:"Type a message..."} style={{background:"none",border:"none",outline:"none",color:C.text,fontFamily:F,fontSize:15,width:"100%"}}/>
            <span style={{color:C.textMuted,cursor:"pointer"}}>{I.attach}</span>
          </div>
          <button onClick={send} style={{width:44,height:44,borderRadius:14,background:msg.trim()?(cantSend?"linear-gradient(135deg,#ff9f1a,#cc7a00)":"linear-gradient(135deg,"+C.accent+","+C.blue+")"):C.card,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:msg.trim()?"#fff":C.textMuted,transition:"all 0.2s"}}>{msg.trim()?I.send:I.mic}</button>
        </div>
      </div>
    </div>
  );
}

// ══════ CHAT LIST ══════
function ChatList({myLang,netMode,translateSettings,onToggle,onSelect,onNav}){
  var[search,setSearch]=useState("");
  var[so,setSo]=useState(false);
  var myL=GL(myLang);
  var isOn=netMode==="online";
  var allFiltered=contacts.filter(function(c){return c.name.toLowerCase().includes(search.toLowerCase())});
  var indiaCount=allFiltered.filter(function(c){return c.region==="in"}).length;
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <SBar netMode={netMode}/>
      <div style={{padding:"8px 20px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:F,fontWeight:900,fontSize:28,color:C.text}}>RELAY</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <div onClick={onToggle} style={{display:"inline-flex",alignItems:"center",gap:5,background:isOn?"rgba(59,130,246,0.12)":"rgba(255,159,26,0.12)",padding:"3px 12px",borderRadius:20,cursor:"pointer",border:"1px solid "+(isOn?"rgba(59,130,246,0.2)":"rgba(255,159,26,0.2)")}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:isOn?"#3b82f6":"#ff9f1a",animation:"pulse 2s infinite"}}/>
                <span style={{fontFamily:FM,fontSize:10,color:isOn?"#3b82f6":"#ff9f1a",letterSpacing:1.5}}>{isOn?"ONLINE":"CELLULAR"}</span>
              </div>
              <div onClick={function(){onNav("translate")}} style={{display:"inline-flex",alignItems:"center",gap:4,background:C.accentGlow,padding:"3px 12px",borderRadius:20,cursor:"pointer",border:"1px solid rgba(0,229,160,0.2)"}}><span style={{fontSize:13}}>{myL.flag}</span><span style={{fontFamily:FM,fontSize:10,color:C.accent,letterSpacing:1}}>I SPEAK {myL.name.toUpperCase()}</span></div>
            </div>
          </div>
          <button onClick={function(){setSo(!so)}} style={{background:so?C.accentGlow:C.card,border:"none",borderRadius:12,padding:10,color:so?C.accent:C.textDim,cursor:"pointer"}}>{I.search}</button>
        </div>
        {so&&<div style={{marginTop:10,background:C.card,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.border}}><span style={{color:C.textMuted}}>{I.search}</span><input autoFocus value={search} onChange={function(e){setSearch(e.target.value)}} placeholder="Search..." style={{background:"none",border:"none",outline:"none",color:C.text,fontFamily:F,fontSize:14,width:"100%"}}/></div>}
      </div>
      {/* Mode Banner */}
      <div style={{margin:"0 16px 8px",padding:"10px 16px",borderRadius:14,background:isOn?"linear-gradient(135deg,rgba(59,130,246,0.08),rgba(0,229,160,0.08))":"linear-gradient(135deg,rgba(255,159,26,0.08),rgba(255,59,92,0.04))",border:"1px solid "+(isOn?"rgba(59,130,246,0.12)":"rgba(255,159,26,0.12)"),display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:20}}>{isOn?"🌐":"📡"}</span>
        <div style={{flex:1}}>
          <div style={{fontFamily:F,fontWeight:600,fontSize:13,color:C.text}}>{isOn?"Online — Global Access":"Cellular Mode"}</div>
          <div style={{fontFamily:F,fontSize:11,color:C.textDim,marginTop:2}}>{isOn?"Auto-translate all chats · AI powered":"Auto-translate India chats · Local engine"}</div>
        </div>
        {isOn&&<span style={{fontFamily:FM,fontSize:9,color:C.accent}}>🌐 AI</span>}
      </div>
      {/* Quick Access SuperTools */}
      <div style={{padding:"0 16px 8px",display:"flex",gap:8,overflowX:"auto"}}>
        {[{icon:"🆘",label:"SOS",k:"sos"},{icon:"🎙️",label:"Walkie",k:"walkie"},{icon:"🔐",label:"Vault",k:"vault"},{icon:"💸",label:"Pay",k:"pay"}].map(function(t){return (
          <button key={t.k} onClick={function(){onNav(t.k)}} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",background:C.card,borderRadius:20,border:"1px solid "+C.border,cursor:"pointer",flexShrink:0}}>
            <span style={{fontSize:14}}>{t.icon}</span>
            <span style={{fontFamily:F,fontSize:12,fontWeight:600,color:C.text}}>{t.label}</span>
          </button>
        )})}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 12px"}}>
        {allFiltered.map(function(c,i){
          var f=GL(c.lang).flag;
          var t=translateText(c.msg,myLang);
          var d=t!==c.msg;
          var isForeign=c.region!=="in";
          var cantSend=!isOn&&isForeign;
          return (<div key={c.id} onClick={function(){onSelect(c)}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 12px",borderRadius:16,cursor:"pointer",borderBottom:"1px solid "+C.border,animation:"su 0.25s "+i*0.04+"s both"}}>
            <Av name={c.name} initials={c.av} size={50} online={c.online}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontFamily:F,fontWeight:600,fontSize:15,color:C.text}}>{c.name}</span><span style={{fontSize:13}}>{f}</span>{cantSend&&<span style={{fontFamily:FM,fontSize:8,color:"#ff9f1a",background:"rgba(255,159,26,0.1)",padding:"1px 6px",borderRadius:6,letterSpacing:0.5}}>QUEUED</span>}</div><span style={{fontFamily:FM,fontSize:10,color:c.unread?C.accent:C.textMuted}}>{c.time}</span></div>
              <div style={{marginTop:4}}><div style={{fontFamily:F,fontSize:13,color:C.textDim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t}</div>{d&&<div style={{fontFamily:F,fontSize:11,color:C.textMuted,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2,opacity:0.5}}>{c.msg}</div>}</div>
            </div>
            {c.unread>0&&<div style={{minWidth:20,height:20,borderRadius:10,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FM,fontSize:10,fontWeight:700,color:"#000",padding:"0 6px"}}>{c.unread}</div>}
          </div>);
        })}
      </div>
      <button style={{position:"absolute",bottom:80,right:20,width:56,height:56,borderRadius:18,background:"linear-gradient(135deg,"+C.accent+","+C.blue+")",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 24px "+C.accentGlow,color:"#fff"}}>{I.newChat}</button>
      <BNav active="chats" onNav={onNav}/>
    </div>
  );
}

// ══════ I SPEAK — ONE TIME SETUP ══════

      <div style={{padding:24,borderRadius:20,textAlign:"center",marginBottom:16,background:"linear-gradient(135deg,"+C.accentGlow+","+C.blueGlow+")",border:"1px solid rgba(0,229,160,0.15)"}}>
        <span style={{fontSize:52}}>{cur.flag}</span>
        <div style={{fontFamily:F,fontWeight:800,fontSize:24,color:C.accent,marginTop:12}}>I speak {cur.name}</div>
        <div style={{fontFamily:F,fontSize:13,color:C.textDim,marginTop:6}}>All messages auto-translate to {cur.name} for you</div>
      </div>

      {/* How it works */}
      <div style={{padding:16,borderRadius:16,background:C.card,border:"1px solid "+C.border,marginBottom:16}}>
        <div style={{fontFamily:FM,fontSize:10,color:C.accent,letterSpacing:2,marginBottom:12}}>HOW AUTO-TRANSLATION WORKS</div>
        {examples.map(function(ex,i){return (<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<examples.length-1?"1px solid "+C.border:"none"}}>
          <span style={{fontSize:18}}>{ex.flag}</span>

function Vault({netMode,onBack}){
  var[locked,setLocked]=useState(true);

    if(pin.length<4){
      var np=pin+n;setPin(np);
      if(np==="1234")setTimeout(function(){setLocked(false)},300);
      else if(np.length===4)setTimeout(function(){setPin("")},400);
    }
  };
  if(!locked){
    var vaultChats=[{name:"Secret Project",msg:"Documents ready",av:"🔐"},{name:"Private Notes",msg:"Account details saved",av:"📝"},{name:"Hidden Chat",msg:"Confidential conversation",av:"👤"}];
    return (<div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>

          <div style={{flex:1}}>
            <div style={{fontFamily:F,fontWeight:600,fontSize:14,color:C.text}}>{c.name}</div>
            <div style={{fontFamily:F,fontSize:12,color:C.textDim,marginTop:2}}>{c.msg}</div>

      <div style={{padding:"12px 20px",background:C.card,borderTop:"1px solid "+C.border,textAlign:"center",fontFamily:F,fontSize:11,color:C.textDim}}>Hidden from recent apps · Decoy PIN shows fake screen</div>
    </div>);
  }
  return (<div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <SBar netMode={netMode}/>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 18px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer"}}>{I.back}</button>
      <span style={{fontFamily:F,fontWeight:800,fontSize:22,color:"#a855f7"}}>Vault Chat</span>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:28}}>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a855f7" strokeWidth="2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/></svg>
      <div style={{fontFamily:F,fontWeight:700,fontSize:18,color:C.text}}>Enter Vault PIN</div>
      <div style={{display:"flex",gap:14}}>
        {[0,1,2,3].map(function(i){return (<div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<pin.length?"#a855f7":"transparent",border:"2px solid "+(i<pin.length?"#a855f7":C.textMuted),transition:"all 0.15s",transform:i<pin.length?"scale(1.2)":"scale(1)"}}/>)})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginTop:8}}>
        {[1,2,3,4,5,6,7,8,9,null,0,"⌫"].map(function(n,i){return (<button key={i} onClick={function(){if(n==="⌫")setPin(pin.slice(0,-1));else if(n!==null)handleKey(String(n))}} style={{width:64,height:52,borderRadius:14,border:"none",background:n===null?"transparent":C.card,color:C.text,fontFamily:F,fontWeight:600,fontSize:n==="⌫"?18:22,cursor:n===null?"default":"pointer"}}>{n}</button>)})}
      </div>
      <div style={{fontFamily:FM,fontSize:10,color:C.textMuted,letterSpacing:1}}>Try: 1234</div>
    </div>
  </div>);

// ══════ MAIN APP ══════
function RelayApp(){
  var[screen,setScreen]=useState("splash");
  var[chat,setChat]=useState(null);
  var[myLang,setMyLang]=useState("hi");
  var[translateSettings,setTranslateSettings]=useState({});
  var setTranslate=function(cid,settings){setTranslateSettings(function(prev){var n={};Object.keys(prev).forEach(function(k){n[k]=prev[k]});n[cid]=settings;return n})};
  var[netMode,setNetMode]=useState("online");
  var[modeToast,setModeToast]=useState("");
  // Auto-detect connectivity every 5 seconds
  useEffect(function(){
    function check(){
      var online=navigator.onLine;
      setNetMode(function(prev){
        if(prev==="online"&&!online){setModeToast("📡 Switched to Cellular Mode — India only");setTimeout(function(){setModeToast("")},3000);return "offline"}
        if(prev==="offline"&&online){setModeToast("🌐 Back Online — Global access restored");setTimeout(function(){setModeToast("")},3000);return "online"}
        return prev;
      });
    }
    check();
    var i=setInterval(check,5000);
    window.addEventListener("online",function(){setNetMode("online");setModeToast("🌐 Back Online — Global access restored");setTimeout(function(){setModeToast("")},3000)});
    window.addEventListener("offline",function(){setNetMode("offline");setModeToast("📡 Switched to Cellular Mode — India only");setTimeout(function(){setModeToast("")},3000)});
    return function(){clearInterval(i)};
  },[]);
  // Demo toggle: tap status bar to simulate mode switch
  var toggleMode=function(){setNetMode(function(p){var n=p==="online"?"offline":"online";setModeToast(n==="online"?"🌐 Back Online — Global access restored":"📡 Switched to Cellular Mode — India only");setTimeout(function(){setModeToast("")},3000);return n})};
  var nav=function(k){if(k==="chats")setScreen("chatList");else if(k==="translate")setScreen("langSettings");else if(k==="tools")setScreen("supertools");else if(k==="sos"||k==="walkie"||k==="vault"||k==="pay"||k==="mesh"||k==="alert")setScreen(k);else setScreen("chatList")};
  return (<div style={{height:"100vh",width:"100vw",background:C.bg,overflow:"hidden",position:"relative",paddingTop:"env(safe-area-inset-top,0)"}}>
    {screen==="splash"&&<Splash onDone={function(){setScreen("chatList")}}/>}
    {screen==="chatList"&&<ChatList myLang={myLang} netMode={netMode} translateSettings={translateSettings} onToggle={toggleMode} onSelect={function(c){setChat(c);setScreen("chat")}} onNav={nav}/>}
    {screen==="chat"&&chat&&<ChatView contact={chat} myLang={myLang} netMode={netMode} translateSettings={translateSettings} onSetTranslate={setTranslate} onBack={function(){setScreen("chatList")}}/>}
    {screen==="langSettings"&&<LS myLang={myLang} netMode={netMode} onChange={setMyLang} onBack={nav}/>}
    {screen==="supertools"&&<SuperTools netMode={netMode} onBack={nav} onOpen={nav}/>}
    {screen==="sos"&&<SOS netMode={netMode} onBack={function(){setScreen("supertools")}}/>}
    {screen==="walkie"&&<Walkie netMode={netMode} onBack={function(){setScreen("supertools")}}/>}
    {screen==="vault"&&<Vault netMode={netMode} onBack={function(){setScreen("supertools")}}/>}
    {screen==="pay"&&<ComingSoon title="SMS Pay" icon="💸" desc="Send money via SMS — like UPI but without internet" color={C.accent} netMode={netMode} onBack={function(){setScreen("supertools")}}/>}
    {screen==="mesh"&&<ComingSoon title="Mesh Relay" icon="📡" desc="Bluetooth mesh networking — phone-to-phone when cellular fails" color={C.blue} netMode={netMode} onBack={function(){setScreen("supertools")}}/>}
    {screen==="alert"&&<ComingSoon title="Mass Alert" icon="📢" desc="Broadcast emergency alerts to thousands via SMS" color="#ff3b5c" netMode={netMode} onBack={function(){setScreen("supertools")}}/>}
    {modeToast&&<div style={{position:"absolute",top:50,left:"50%",transform:"translateX(-50%)",padding:"10px 24px",borderRadius:14,background:netMode==="online"?"rgba(59,130,246,0.9)":"rgba(255,159,26,0.9)",color:"#fff",fontFamily:F,fontWeight:600,fontSize:13,zIndex:300,animation:"su 0.3s ease",boxShadow:"0 4px 20px rgba(0,0,0,0.3)",whiteSpace:"nowrap"}}>{modeToast}</div>}
  </div>);
}
