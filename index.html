function detectLang(text){
  if(/[\u0900-\u097F]/.test(text))return "hi";
  var hw=["bhai","haan","nahi","nhi","kya","kahan","theek","hai","hain","ho","karo","kaise","pakka","baje","acha","accha","bahut","badiya","kal","kalh","aaj","bro","yaar","milte","chalte","raha","rahi","rahe","hoon","hu","dekho","bolo","suno","bhej","kar","mein","pe","se","ko","main","tera","mera","ghar","khana","kha","ja","aa","ruk","chal","sab","btao","batao","rehte","rahte","abhi","baad","jaldi","kidhar","bta","bata","rha","krta","bohot","achha","mast","aaoge","jaana","rahi","karte","liye","chahiye","aao","aana","gayi","gaye","aayi","utha","piyoge","sone","sona","neend","jaa","jaao","padh","khel","baith","utho","socho","bhool","yaad","dhundo","khol","bech","bhuka","pyaasa","taiyaar","shuru","khatam","poora","mehnga","sasta","mushkil","aasan","dawai","bukhar","tabiyat","dard","ache","acche","tm","tum","hum","waha","yaha","naya","purana","chalo","bilkul"];
  var words=text.toLowerCase().replace(/[^a-z\s]/g,"").split(/\s+/).filter(Boolean);
  var c=0;words.forEach(function(w){if(hw.indexOf(w)>=0)c++});
  if(c>=2||(words.length<=4&&c>=1))return "hi";
  return "en";
}

function norm(t){return t.trim().toLowerCase().replace(/[\u{1F000}-\u{1FFFF}]/gu,"").replace(/[!?.,:;'"()\-]+/g," ").replace(/\s+/g," ").trim()}

function translateText(text,targetCode){
  var src=detectLang(text);
  if(src===targetCode){targetCode=src==="en"?"hi":"en"}
  var n=norm(text);

  // Lookup helper - normalizes dict keys before comparing
  function lookup(dict,query){
    // Direct
    if(dict[query])return dict[query];
    // Normalize keys and compare
    var keys=Object.keys(dict);
    for(var i=0;i<keys.length;i++){if(norm(keys[i])===query)return dict[keys[i]]}
    return null;
  }

  if(src==="hi"&&targetCode==="en"){
    // 1. Exact match (with normalized key lookup)
    var exact=lookup(hiEn,n);
    if(exact)return exact;
    // 2. Strip common prefixes
    var prefixes=["aur ","bhai ","haan ","toh ","chalo ","oye ","arre ","sun ","dekh "];
    for(var p=0;p<prefixes.length;p++){if(n.indexOf(prefixes[p])===0){var sub=n.slice(prefixes[p].length);var m=lookup(hiEn,sub);if(m)return m}}
    // 3. Fuzzy match (50%+ overlap)
    var bestKey="",bestScore=0;
    var nWords=n.split(" ");
    Object.keys(hiEn).forEach(function(key){
      var kn=norm(key);var kWords=kn.split(" ");
      var match=0;
      nWords.forEach(function(w){if(kWords.indexOf(w)>=0)match++});
      var score=match/Math.max(nWords.length,kWords.length);
      if(score>bestScore&&score>=0.7){bestScore=score;bestKey=key}
    });
    if(bestKey)return hiEn[bestKey];
    // 4. Word-by-word (ALWAYS produces something different)
    var words=text.trim().split(/\s+/);
    var translated=[];
    words.forEach(function(w){
      var cl=w.toLowerCase().replace(/[^a-z]/g,"");
      var mapped=wm[cl];
      if(mapped&&mapped.length>0){translated.push(mapped)}
      else if(mapped===""){/* skip fillers */}
      else{translated.push(w)}
    });
    var r=translated.join(" ");
    r=r.charAt(0).toUpperCase()+r.slice(1);
    if(r.toLowerCase()!==text.trim().toLowerCase())return r;
    // 5. Last resort - prepend [Translated]
    return "[Translated] "+text;
  }

  if(src==="en"&&targetCode==="hi"){
    var exact2=lookup(enHi,n);
    if(exact2)return exact2;
    // Strip prefixes
    var ep=["hey ","hi ","and ","so ","well "];
    for(var e=0;e<ep.length;e++){if(n.indexOf(ep[e])===0){var es=n.slice(ep[e].length);var m2=lookup(enHi,es);if(m2)return m2}}
    // Fuzzy
    var bk2="",bs2=0;
    var nw2=n.split(" ");
    Object.keys(enHi).forEach(function(key){
      var kn=norm(key);var kw=kn.split(" ");
      var mt=0;nw2.forEach(function(w){if(kw.indexOf(w)>=0)mt++});
      var sc=mt/Math.max(nw2.length,kw.length);
      if(sc>bs2&&sc>=0.7){bs2=sc;bk2=key}
    });
    if(bk2)return enHi[bk2];
    // Fallback
    return "[अनुवाद] "+text;
  }
  return "[Translated] "+text;
}

// ══════ UI COMPONENTS ══════
function SBar(){
  var[time,setTime]=useState(new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}));
  useEffect(function(){var i=setInterval(function(){setTime(new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}))},30000);return function(){clearInterval(i)}},[]);
  return (<div style={{display:"flex",justifyContent:"space-between",padding:"12px 20px 4px",fontFamily:FM,fontSize:12,color:C.textDim}}><span style={{fontWeight:600}}>{time}</span><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:C.accent}}>{I.signal}</span><span style={{fontSize:9,letterSpacing:1}}>SMS</span></div></div>);
}
function Av({name,initials,size,online}){
  size=size||48;
  var cols=[["#00e5a0","#00b880"],["#3b82f6","#2563eb"],["#ff3b5c","#dc2645"],["#ff9f1a","#e68a00"],["#a855f7","#8b3fcf"],["#06b6d4","#0891b2"]];
  var i=name.charCodeAt(0)%cols.length;
  return (<div style={{position:"relative",flexShrink:0}}><div style={{width:size,height:size,borderRadius:size*0.3,background:"linear-gradient(135deg,"+cols[i][0]+","+cols[i][1]+")",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,fontWeight:700,fontSize:size*0.34,color:"#fff"}}>{initials}</div>{online&&<div style={{position:"absolute",bottom:-1,right:-1,width:size*0.24,height:size*0.24,borderRadius:"50%",background:"#2ed573",border:"2.5px solid "+C.bg}}/>}</div>);
}
function Dots(){return (<div style={{display:"flex",gap:4,padding:"4px 0"}}>{[0,1,2].map(function(i){return (<div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.accent,animation:"tb 1.4s "+i*0.2+"s infinite"}}/>)})}</div>)}
function BNav({active,onNav}){
  var bolt=<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
  return (<div style={{display:"flex",justifyContent:"space-around",padding:"10px 0 16px",background:C.surface,borderTop:"1px solid "+C.border}}>{[{k:"chats",i:I.home,l:"Chats"},{k:"tools",i:bolt,l:"Tools"},{k:"translate",i:I.translate,l:"Lang"},{k:"profile",i:I.user,l:"Me"}].map(function(x){return (<div key={x.k} onClick={function(){onNav(x.k)}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:active===x.k?C.accent:C.textMuted,cursor:"pointer"}}>{x.i}<span style={{fontFamily:FM,fontSize:8,letterSpacing:0.5}}>{x.l}</span></div>)})}</div>);
}

// ══════ MESSAGE BUBBLE ══════
// TOP = myLang translation, BOTTOM = original (faded)
function Bub({msg}){
  var me=msg.from==="me";
  var[showO,setShowO]=useState(true);
  var diff=msg.top!==msg.original;
  return (
    <div style={{alignSelf:me?"flex-end":"flex-start",maxWidth:"82%",animation:"fi 0.25s ease"}}>
      <div style={{padding:"11px 15px",borderRadius:me?"20px 20px 4px 20px":"20px 20px 20px 4px",background:me?"linear-gradient(135deg,"+C.accent+","+C.accentDark+")":C.msgIn,color:me?"#000":C.text,fontFamily:F,fontSize:15,lineHeight:1.5}}>{msg.top}</div>
      {diff&&showO&&(
        <div onClick={function(){setShowO(false)}} style={{marginTop:3,padding:"6px 12px",cursor:"pointer",borderRadius:me?"12px 12px 4px 12px":"12px 12px 12px 4px",background:me?"rgba(0,229,160,0.05)":"rgba(255,255,255,0.03)",border:"1px solid "+(me?"rgba(0,229,160,0.08)":"rgba(255,255,255,0.04)")}}>
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
            <span style={{fontFamily:FM,fontSize:8,letterSpacing:1.5,color:me?"rgba(0,229,160,0.5)":C.textMuted,opacity:0.7}}>{msg.origLabel}</span>
            <span style={{fontSize:10}}>{msg.origFlag}</span>
          </div>
          <div style={{fontFamily:F,fontSize:12,lineHeight:1.4,fontStyle:"italic",color:me?"rgba(0,229,160,0.30)":"rgba(255,255,255,0.22)"}}>{msg.original}</div>
        </div>
      )}
      {diff&&!showO&&(<div onClick={function(){setShowO(true)}} style={{marginTop:2,padding:"3px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><div style={{width:4,height:4,borderRadius:"50%",background:C.blue,opacity:0.5}}/><span style={{fontFamily:FM,fontSize:8,color:C.textMuted,letterSpacing:1}}>SHOW ORIGINAL</span></div>)}
      <div style={{display:"flex",alignItems:"center",gap:3,marginTop:3,justifyContent:me?"flex-end":"flex-start",padding:"0 4px"}}>
        <span style={{fontFamily:FM,fontSize:9,color:C.textMuted}}>{msg.time}</span>
        {me&&<span style={{color:msg.status==="read"?C.accent:C.textMuted}}>{msg.status==="read"?I.dblCheck:I.check}</span>}
        {diff&&<span style={{fontFamily:FM,fontSize:8,color:C.blue,opacity:0.6,marginLeft:2}}>translated</span>}
      </div>
    </div>
  );
}

  return (<div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,position:"relative"}}>

// ══════ CHAT VIEW ══════
function ChatView({contact,myLang,onBack,onOpenLP}){
  var[msg,setMsg]=useState("");
  var[msgs,setMsgs]=useState([]);
  var[typing,setTyping]=useState(false);
  var ref=useRef(null);
  var idRef=useRef(0);
  var tl=contact.lang;
  var myL=GL(myLang),thL=GL(tl);
  var nid=function(){return ++idRef.current};

  // ME: TOP = English translation (what receiver sees), BOTTOM = Hindi original (what I typed)
  // THEM: TOP = Hindi original (what I read naturally), BOTTOM = English translation (reference)
  function buildMsg(original,from,time,status){
    var isMe=from==="me";
    var translated=translateText(original,myLang);
    var top,bottom,bLabel,bFlag;
    if(isMe){
      top=translated; bottom=original;
      bLabel="YOU TYPED"; bFlag=GL(myLang).flag;
    }else{
      top=original; bottom=translated;
      bLabel="TRANSLATED "+GL(myLang).name.toUpperCase(); bFlag=GL(myLang).flag;
    }
    return {id:nid(),from:from,time:time,status:status,original:bottom,top:top,origLabel:bLabel,origFlag:bFlag};
  }

  useEffect(function(){
    idRef.current=0;
    setMsgs([
      buildMsg("Bhai kal milte hain pakka!","them","2:20 PM"),
      buildMsg("Haan bro, pakka! 6 baje chalte hain","me","2:22 PM","read"),
      buildMsg("Sahi hai 🔥 Main bike se aaunga","them","2:25 PM"),
      buildMsg("Theek hai, metro pe mil jaayenge","me","2:28 PM","delivered"),
      buildMsg("Done! Aur project ka kya hua?","them","2:30 PM")
    ]);
  },[myLang,tl]);

  useEffect(function(){if(ref.current)ref.current.scrollIntoView({behavior:"smooth"})},[msgs,typing]);

  var send=function(){
    if(!msg.trim())return;
    var now=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
    var m=buildMsg(msg.trim(),"me",now,"sent");
    setMsgs(function(p){return p.concat([m])});
    setMsg("");
    setTyping(true);
    setTimeout(function(){
      setTyping(false);
      var sent=msg.trim().toLowerCase();
      // PRE-PAIRED replies — Hindi + English together, NO translation needed
      var pairs={
        sleep:[{hi:"Acha theek hai, good night bhai! Kal baat karte hain",en:"Good night! Talk to you tomorrow then"},{hi:"Haan bhai so jaa, bohot raat ho gayi",en:"Yeah go to sleep, it's really late"},{hi:"Good night bro! Subah msg karna",en:"Good night bro! Text me in the morning"}],
        food:[{hi:"Haan bhai khana kha lo, main bhi abhi khaunga",en:"Yeah go eat! I'm about to have dinner too"},{hi:"Kya kha rahe ho? Mujhe bhi bhook lag rhi hai",en:"What are you eating? I'm hungry too"},{hi:"Maine abhi pizza order kiya, tu bhi mangwa le",en:"I just ordered pizza, you should order too"}],
        greet:[{hi:"Main theek hoon bhai! Tu bata, kya chal raha hai?",en:"I'm doing great brother! What about you, what's up?"},{hi:"Sab badiya hai yaar! Tu suna, kaisa hai tu?",en:"Everything's good dude! Tell me, how are you?"},{hi:"Bas chal raha hai bhai, tu bata kya scene hai?",en:"Just going on brother, what's the scene?"}],
        meet:[{hi:"Haan pakka bhai! Time aur jagah fix karte hain",en:"Sure! Let's fix the time and place"},{hi:"Done bhai! Main free hoon, bata kab milna hai",en:"Done bro! I'm free, tell me when to meet"},{hi:"Bohot din ho gaye milke, pakka aana is baar",en:"It's been so long, definitely come this time"}],
        location:[{hi:"Main ghar pe hoon bhai, tu bata kya hua?",en:"I'm at home brother, what happened?"},{hi:"Abhi office mein hoon, shaam ko free hounga",en:"At office right now, will be free in the evening"},{hi:"Delhi mein hoon bhai, tu kidhar hai?",en:"I'm in Delhi brother, where are you?"}],
        busy:[{hi:"Acha theek hai bhai, baad mein baat karte hain",en:"Alright, let's catch up later then"},{hi:"Koi nahi bhai, jab free ho tab call karna",en:"No worries bro, call me when you're free"},{hi:"Haan samajh raha hoon, apna kaam kar tu",en:"Yeah I understand, you focus on your work"}],
        bye:[{hi:"Acha bhai bye! Take care, phir milte hain",en:"Bye! Take care, talk soon!"},{hi:"Bye bro! Apna khayal rakh",en:"Bye bro! Take care of yourself"},{hi:"Chal phir milte hain, good night!",en:"See you later, good night!"}],
        sorry:[{hi:"Arre koi baat nahi bhai, tension mat le",en:"No worries at all, don't stress about it!"},{hi:"Chal chod yaar, hota hai kabhi kabhi",en:"Forget it dude, it happens sometimes"},{hi:"Sorry ki kya zaroorat, sab theek hai",en:"No need to say sorry, everything's fine"}],
        thanks:[{hi:"Arre bhai thanks ki kya zaroorat, apne hain!",en:"No need to thank me, that's what friends are for!"},{hi:"Mention not bhai, kabhi bhi bol dena",en:"Don't mention it bro, just let me know anytime"},{hi:"Koi baat nahi yaar, tere liye toh kuch bhi",en:"No worries dude, anything for you"}]
      };
      var randoms=[
        {hi:"Haan bhai sahi kaha!",en:"Yeah bro, well said!"},{hi:"Bilkul sahi baat hai",en:"That's absolutely right"},
        {hi:"Acha acha batao phir",en:"Okay okay, tell me more"},{hi:"Wah bhai wah! Kya baat hai",en:"Wow brother wow! Amazing!"},
        {hi:"Sahi hai yaar, agree karta hoon",en:"That's right dude, I agree"},{hi:"Hmm samajh gaya, phir kya karna hai?",en:"Got it, so what's the plan?"},
        {hi:"Haan bhai sun raha hoon, bol",en:"Yeah brother I'm listening, go on"},{hi:"Pakka bhai! Main ready hoon",en:"Sure brother! I'm ready"},
        {hi:"Haha bohot funny hai yaar tu",en:"Haha you're so funny dude"},{hi:"Arey wah! Ye toh mast news hai",en:"Oh wow! That's awesome news"},
        {hi:"Sach mein? Bohot acha laga sunke!",en:"Really? So happy to hear that!"},{hi:"Dekh lenge bhai, kuch ho jayega",en:"We'll figure it out brother"},
        {hi:"Tu fikar mat kar, sab sahi hoga",en:"Don't worry, everything will be fine"},{hi:"Bhai ye toh top class hai!",en:"Brother this is top class!"},
        {hi:"Main bhi wohi soch raha tha",en:"I was thinking the same thing"},{hi:"Arre yaar tension mat le",en:"Hey dude don't stress"},
        {hi:"Bohot badhiya bhai!",en:"That's great brother!"},{hi:"Chal theek hai done!",en:"Alright fine, done!"},
        {hi:"Bhai tu best hai!",en:"Brother you're the best!"},{hi:"Suno ek baat batao mujhe",en:"Tell me one thing"}
      ];
      // Pick based on context
      var pair;
      if(/sone|neend|sleep|raat|good night|so ja/.test(sent)){pair=pick(pairs.sleep)}
      else if(/khana|kha|bhuka|hungry|eat|pizza|food/.test(sent)){pair=pick(pairs.food)}
      else if(/kaise|haal|how are|kaisa|kaisi|btao/.test(sent)){pair=pick(pairs.greet)}
      else if(/milte|milna|meet|plan/.test(sent)){pair=pick(pairs.meet)}
      else if(/kahan|kidhar|where|rahte|rehte/.test(sent)){pair=pick(pairs.location)}
      else if(/busy|kaam|work|office|meeting/.test(sent)){pair=pick(pairs.busy)}
      else if(/bye|chalta|alvida|tata/.test(sent)){pair=pick(pairs.bye)}
      else if(/sorry|maaf|galti/.test(sent)){pair=pick(pairs.sorry)}
      else if(/thanks|shukriya|dhanyawad/.test(sent)){pair=pick(pairs.thanks)}
      else{pair=pick(randoms)}
      function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
      // MY perspective: I read Hindi naturally
      // So THEIR reply: TOP = Hindi (what I read), BOTTOM = English (what they typed)
      var replyTop=pair.hi||pair.en;
      var replyOrig=pair.en||pair.hi;
      var origLang=GL(tl);
      var rt=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
      var rm={id:nid(),from:"them",time:rt,original:replyOrig,top:replyTop,origLabel:"ORIGINAL "+origLang.name.toUpperCase(),origFlag:origLang.flag};
      setMsgs(function(p){return p.concat([rm])});
    },2000);
  };

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <SBar/>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 16px 12px",borderBottom:"1px solid "+C.border,background:C.surface}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",padding:4}}>{I.back}</button>
        <Av name={contact.name} initials={contact.av} size={40} online={contact.online}/>
        <div style={{flex:1}}><div style={{fontFamily:F,fontWeight:700,fontSize:16,color:C.text}}>{contact.name}</div><div style={{fontFamily:FM,fontSize:10,color:contact.online?"#2ed573":C.textMuted}}>{contact.online?"online · speaks "+thL.name:"last seen 5m ago"}</div></div>
        <button onClick={onOpenLP} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 12px",background:C.blueGlow,borderRadius:20,border:"1px solid rgba(59,130,246,0.2)",cursor:"pointer"}}><span style={{fontSize:13}}>{thL.flag}</span><span style={{color:C.blue,fontSize:11}}>⇄</span><span style={{fontSize:13}}>{myL.flag}</span></button>
      </div>
      <div style={{textAlign:"center",padding:"7px 10px",background:"linear-gradient(90deg,transparent,"+C.blueGlow+",transparent)"}}><span style={{fontFamily:FM,fontSize:9,color:C.textMuted,letterSpacing:1.5}}>🌐 TRANSLATES · {thL.flag} {thL.name.toUpperCase()} ⇄ {myL.flag} {myL.name.toUpperCase()}</span></div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px",display:"flex",flexDirection:"column",gap:8}}>
        {msgs.map(function(m){return (<Bub key={m.id} msg={m}/>)})}
        {typing&&<div style={{alignSelf:"flex-start",background:C.msgIn,padding:"10px 16px",borderRadius:"16px 16px 16px 4px"}}><Dots/></div>}
        <div ref={ref}/>
      </div>
      <div style={{background:C.surface,borderTop:"1px solid "+C.border}}>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"7px 16px 0"}}><span style={{fontSize:12}}>✍️</span><span style={{fontFamily:FM,fontSize:9,color:C.textDim,letterSpacing:1}}>TYPE IN ANY LANGUAGE</span><span style={{color:C.textMuted}}>→</span><span style={{fontFamily:FM,fontSize:9,color:C.blue,letterSpacing:1}}>SHOWS AS {myL.name.toUpperCase()} {myL.flag}</span></div>
        <div style={{padding:"8px 14px 16px",display:"flex",alignItems:"flex-end",gap:10}}>
          <button style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",padding:4}}>{I.emoji}</button>
          <div style={{flex:1,background:C.card,borderRadius:24,padding:"11px 16px",display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.border}}>
            <input value={msg} onChange={function(e){setMsg(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")send()}} placeholder="Type in any language..." style={{background:"none",border:"none",outline:"none",color:C.text,fontFamily:F,fontSize:15,width:"100%"}}/>
            <span style={{color:C.textMuted,cursor:"pointer"}}>{I.attach}</span>
          </div>
          <button onClick={send} style={{width:44,height:44,borderRadius:14,background:msg.trim()?"linear-gradient(135deg,"+C.accent+","+C.blue+")":C.card,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:msg.trim()?"#fff":C.textMuted,transition:"all 0.2s"}}>{msg.trim()?I.send:I.mic}</button>
        </div>
      </div>
    </div>
  );
}

// ══════ CHAT LIST ══════
function ChatList({myLang,onSelect,onNav}){
  var[search,setSearch]=useState("");
  var[so,setSo]=useState(false);
  var myL=GL(myLang);
  var filtered=contacts.filter(function(c){return c.name.toLowerCase().includes(search.toLowerCase())});
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <SBar/>
      <div style={{padding:"8px 20px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:F,fontWeight:900,fontSize:28,color:C.text}}>RELAY</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <div style={{display:"inline-flex",alignItems:"center",gap:5,background:C.accentGlow,padding:"3px 12px",borderRadius:20}}><div style={{width:6,height:6,borderRadius:"50%",background:C.accent,animation:"pulse 2s infinite"}}/><span style={{fontFamily:FM,fontSize:10,color:C.accent,letterSpacing:1.5}}>CELLULAR</span></div>
              <div onClick={function(){onNav("translate")}} style={{display:"inline-flex",alignItems:"center",gap:4,background:C.blueGlow,padding:"3px 12px",borderRadius:20,cursor:"pointer",border:"1px solid rgba(59,130,246,0.15)"}}><span style={{fontSize:13}}>{myL.flag}</span><span style={{fontFamily:FM,fontSize:10,color:C.blue,letterSpacing:1}}>{myL.name.toUpperCase()}</span>{I.chevDown}</div>
            </div>
          </div>
          <button onClick={function(){setSo(!so)}} style={{background:so?C.accentGlow:C.card,border:"none",borderRadius:12,padding:10,color:so?C.accent:C.textDim,cursor:"pointer"}}>{I.search}</button>
        </div>
        {so&&<div style={{marginTop:10,background:C.card,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.border}}><span style={{color:C.textMuted}}>{I.search}</span><input autoFocus value={search} onChange={function(e){setSearch(e.target.value)}} placeholder="Search..." style={{background:"none",border:"none",outline:"none",color:C.text,fontFamily:F,fontSize:14,width:"100%"}}/></div>}
      </div>
      <div style={{margin:"0 16px 10px",padding:"12px 16px",borderRadius:16,background:"linear-gradient(135deg,"+C.blueGlow+","+C.accentGlow+")",border:"1px solid rgba(59,130,246,0.1)",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:20}}>🌐</span>
        <div style={{flex:1}}><div style={{fontFamily:F,fontWeight:600,fontSize:13,color:C.text}}>Instant Translation Active</div><div style={{fontFamily:F,fontSize:11,color:C.textDim,marginTop:2}}>All chats translate to {myL.name} {myL.flag}</div></div>
        <button onClick={function(){onNav("translate")}} style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"6px 12px",fontFamily:FM,fontSize:10,color:C.blue,cursor:"pointer"}}>Change</button>
      </div>
      {/* Quick Access SuperTools */}
      <div style={{padding:"0 16px 10px",display:"flex",gap:8,overflowX:"auto"}}>
        {[{icon:"🆘",label:"SOS",color:"#ff3b5c",k:"sos"},{icon:"🎙️",label:"Walkie",color:"#ff9f1a",k:"walkie"},{icon:"🔐",label:"Vault",color:"#a855f7",k:"vault"},{icon:"💸",label:"Pay",color:C.accent,k:"pay"}].map(function(t){return (
          <button key={t.k} onClick={function(){onNav(t.k)}} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",background:C.card,borderRadius:20,border:"1px solid "+C.border,cursor:"pointer",flexShrink:0,transition:"all 0.2s"}}>
            <span style={{fontSize:14}}>{t.icon}</span>
            <span style={{fontFamily:F,fontSize:12,fontWeight:600,color:C.text}}>{t.label}</span>
          </button>
        )})}
      </div>
      <div style={{padding:"0 16px 10px",display:"flex",gap:8,overflowX:"auto"}}>
        {[{icon:"🆘",label:"SOS",k:"sos"},{icon:"🎙️",label:"Walkie",k:"walkie"},{icon:"🔐",label:"Vault",k:"vault"},{icon:"💸",label:"Pay",k:"pay"}].map(function(t){return (<button key={t.k} onClick={function(){onNav(t.k)}} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",background:C.card,borderRadius:20,border:"1px solid "+C.border,cursor:"pointer",flexShrink:0}}><span style={{fontSize:14}}>{t.icon}</span><span style={{fontFamily:F,fontSize:12,fontWeight:600,color:C.text}}>{t.label}</span></button>)})}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 12px"}}>
        {filtered.map(function(c,i){
          var f=GL(c.lang).flag;
          var t=translateText(c.msg,myLang);
          var d=t!==c.msg;
          return (<div key={c.id} onClick={function(){onSelect(c)}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 12px",borderRadius:16,cursor:"pointer",borderBottom:"1px solid "+C.border,animation:"su 0.25s "+i*0.04+"s both"}}>
            <Av name={c.name} initials={c.av} size={50} online={c.online}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontFamily:F,fontWeight:600,fontSize:15,color:C.text}}>{c.name}</span><span style={{fontSize:13}}>{f}</span></div><span style={{fontFamily:FM,fontSize:10,color:c.unread?C.accent:C.textMuted}}>{c.time}</span></div>
              <div style={{marginTop:4}}><div style={{fontFamily:F,fontSize:13,color:C.textDim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t}</div>{d&&<div style={{fontFamily:F,fontSize:11,color:C.textMuted,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2,opacity:0.5}}>{c.msg}</div>}</div>
            </div>
            {c.unread>0&&<div style={{minWidth:20,height:20,borderRadius:10,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FM,fontSize:10,fontWeight:700,color:"#000",padding:"0 6px"}}>{c.unread}</div>}
          </div>);
        })}
      </div>
      <button style={{position:"absolute",bottom:80,right:20,width:56,height:56,borderRadius:18,background:"linear-gradient(135deg,"+C.accent+","+C.blue+")",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 24px "+C.accentGlow,color:"#fff"}}>{I.newChat}</button>
      <BNav active="chats" onNav={onNav}/>
    </div>
  );
}

// ══════ LANG SETTINGS ══════

// ══════ LANG PICKER ══════

  var[s,setS]=useState("");
  var fl=langs.filter(function(l){return l.name.toLowerCase().includes(s.toLowerCase())});
  return (<div style={{position:"absolute",inset:0,zIndex:100,background:"rgba(0,0,0,0.9)",backdropFilter:"blur(10px)",display:"flex",flexDirection:"column",animation:"fi 0.25s"}}>
    <div style={{padding:"60px 20px 12px",display:"flex",justifyContent:"space-between"}}><div><div style={{fontFamily:F,fontWeight:800,fontSize:24,color:C.text}}>Your Language</div><div style={{fontFamily:F,fontSize:13,color:C.textDim,marginTop:4}}>Chats translate to this</div></div><button onClick={onClose} style={{background:C.card,border:"none",borderRadius:12,padding:10,color:C.textDim,cursor:"pointer"}}>{I.x}</button></div>
    <div style={{padding:"0 20px 12px"}}><div style={{background:C.card,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.border}}><span style={{color:C.textMuted}}>{I.search}</span><input autoFocus value={s} onChange={function(e){setS(e.target.value)}} placeholder="Search language..." style={{background:"none",border:"none",outline:"none",color:C.text,fontFamily:F,fontSize:15,width:"100%"}}/></div></div>
    <div style={{flex:1,overflowY:"auto",padding:"0 16px"}}>{fl.map(function(l,i){var a=current===l.code;return (<div key={l.code} onClick={function(){onSelect(l.code)}} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 16px",borderRadius:16,cursor:"pointer",marginBottom:4,background:a?C.accentGlow:"transparent",border:a?"1px solid "+C.accent+"33":"1px solid transparent",animation:"su 0.25s "+i*0.03+"s both"}}><span style={{fontSize:30}}>{l.flag}</span><span style={{flex:1,fontFamily:F,fontWeight:600,fontSize:16,color:a?C.accent:C.text}}>{l.name}</span>{a&&<div style={{width:26,height:26,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>}</div>)})}</div>
  </div>);
}

// ══════ SOS EMERGENCY ══════
function SOS({onBack}){
  var[armed,setArmed]=useState(false);
  var[count,setCount]=useState(5);
  var[sent,setSent]=useState(false);
  useEffect(function(){
    if(armed&&count>0){var t=setTimeout(function(){setCount(count-1)},1000);return function(){clearTimeout(t)}}
    if(armed&&count===0){setSent(true);setArmed(false)}
  },[armed,count]);
  var cancel=function(){setArmed(false);setCount(5)};
  var contacts=["Mom ❤️","Rahul Sharma","Police 100"];
  return (<div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <SBar/>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 18px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer"}}>{I.back}</button>
      <span style={{fontFamily:F,fontWeight:800,fontSize:22,color:"#ff3b5c"}}>SOS Emergency</span>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 30px",gap:20}}>
      {!sent?(<React.Fragment>
        <div onClick={armed?cancel:function(){setArmed(true)}} style={{
          width:armed?180:150,height:armed?180:150,borderRadius:"50%",cursor:"pointer",
          background:armed?"radial-gradient(circle,#ff3b5c,#8b0000)":"radial-gradient(circle,#3a1020,"+C.card+")",
          display:"flex",alignItems:"center",justifyContent:"center",
          border:"3px solid "+(armed?"#ff3b5c":"rgba(255,59,92,0.3)"),
          boxShadow:armed?"0 0 60px rgba(255,59,92,0.3),0 0 120px rgba(255,59,92,0.15)":"none",
          transition:"all 0.4s",animation:armed?"sosPulse 1s infinite":"none"
        }}>
          {armed?(<div style={{textAlign:"center"}}>
            <div style={{fontFamily:FM,fontSize:48,fontWeight:900,color:"#fff"}}>{count}</div>
            <div style={{fontFamily:FM,fontSize:10,color:"#ffaaaa",letterSpacing:2}}>TAP TO CANCEL</div>
          </div>):(<div style={{textAlign:"center"}}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ff3b5c" strokeWidth="2" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <div style={{fontFamily:F,fontWeight:800,fontSize:16,color:"#ff3b5c",marginTop:8}}>TAP SOS</div>
          </div>)}
        </div>
        <div style={{textAlign:"center",maxWidth:280}}>
          <div style={{fontFamily:F,fontWeight:700,fontSize:16,color:C.text}}>{armed?"Sending Emergency Alert...":"One Tap Emergency"}</div>
          <div style={{fontFamily:F,fontSize:13,color:C.textDim,marginTop:6,lineHeight:1.5}}>{armed?"GPS + SOS via SMS to all emergency contacts":"Sends live GPS + SOS to saved contacts — works WITHOUT internet"}</div>
        </div>
        <div style={{width:"100%",marginTop:10}}>
          <div style={{fontFamily:FM,fontSize:10,color:C.textMuted,letterSpacing:1.5,marginBottom:10}}>EMERGENCY CONTACTS</div>
          {contacts.map(function(n,i){return (<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:C.card,borderRadius:12,marginBottom:6,border:"1px solid "+C.border}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#ff3b5c"}}/>
            <span style={{fontFamily:F,fontSize:13,color:C.text,flex:1}}>{n}</span>
            <span style={{fontFamily:FM,fontSize:10,color:C.textDim}}>SMS</span>
          </div>)})}
        </div>
      </React.Fragment>):(<div style={{textAlign:"center",animation:"fi 0.5s"}}>
        <div style={{width:100,height:100,borderRadius:"50%",background:C.accentGlow,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",border:"2px solid "+C.accent}}>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div style={{fontFamily:F,fontWeight:800,fontSize:20,color:C.accent}}>SOS Sent!</div>
        <div style={{fontFamily:F,fontSize:13,color:C.textDim,marginTop:8,lineHeight:1.5}}>Emergency SMS sent to 3 contacts with GPS</div>
        <button onClick={function(){setSent(false);setCount(5)}} style={{marginTop:24,padding:"12px 32px",borderRadius:14,background:C.card,border:"1px solid "+C.border,color:C.text,fontFamily:F,fontWeight:600,fontSize:14,cursor:"pointer"}}>Done</button>
      </div>)}
    </div>
  </div>);
}

// ══════ WALKIE TALKIE ══════
function Walkie({onBack}){
  var[hold,setHold]=useState(false);
  var[sec,setSec]=useState(0);
  useEffect(function(){
    if(hold){var i=setInterval(function(){setSec(function(s){return s+1})},1000);return function(){clearInterval(i)}}
    setSec(0);
  },[hold]);
  return (<div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <SBar/>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 18px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer"}}>{I.back}</button>
      <span style={{fontFamily:F,fontWeight:800,fontSize:22,color:"#ff9f1a"}}>Walkie-Talkie</span>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24}}>
      <div style={{background:C.card,borderRadius:16,padding:"16px 28px",border:"1px solid "+C.border,textAlign:"center"}}>
        <div style={{fontFamily:FM,fontSize:10,color:"#ff9f1a",letterSpacing:2}}>CHANNEL</div>
        <div style={{fontFamily:F,fontWeight:800,fontSize:28,color:C.text,marginTop:4}}>Dev Team 🔥</div>
        <div style={{fontFamily:FM,fontSize:11,color:C.textDim,marginTop:4}}>8 members · 3 online</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:3,height:60}}>
        {Array.from({length:24},function(_,i){return i}).map(function(i){return (<div key={i} style={{width:4,borderRadius:2,background:hold?"#ff9f1a":C.textMuted,height:hold?(15+Math.sin(i)*20+Math.random()*15)+"px":"6px",transition:hold?"none":"height 0.3s",opacity:hold?0.9:0.3}}/>)})}
      </div>
      <div style={{fontFamily:FM,fontSize:14,color:hold?"#ff9f1a":C.textMuted,letterSpacing:2}}>
        {hold?String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0"):"PUSH TO TALK"}
      </div>
      <div onMouseDown={function(){setHold(true)}} onMouseUp={function(){setHold(false)}} onMouseLeave={function(){setHold(false)}}
        onTouchStart={function(){setHold(true)}} onTouchEnd={function(){setHold(false)}}
        style={{
          width:130,height:130,borderRadius:"50%",cursor:"pointer",userSelect:"none",
          background:hold?"radial-gradient(circle,#ff9f1a,#cc7a00)":"radial-gradient(circle,"+C.card+","+C.bg+")",
          border:"3px solid "+(hold?"#ff9f1a":"rgba(255,159,26,0.2)"),
          boxShadow:hold?"0 0 50px rgba(255,159,26,0.2),0 0 100px rgba(255,159,26,0.1)":"none",
          display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",
          transform:hold?"scale(1.08)":"scale(1)"
        }}>
        <div style={{color:hold?"#000":C.textDim,transform:"scale(2)"}}>{I.mic}</div>
      </div>
      <div style={{fontFamily:F,fontSize:12,color:C.textDim,textAlign:"center",maxWidth:220}}>
        Uses cellular voice — <span style={{color:"#ff9f1a"}}>zero internet needed</span>
      </div>
    </div>
  </div>);
}

// ══════ VAULT CHAT ══════
function Vault({onBack}){
  var[locked,setLocked]=useState(true);
  var[pin,setPin]=useState("");
  var handleKey=function(n){
    if(pin.length<4){
      var np=pin+n;setPin(np);
      if(np==="1234")setTimeout(function(){setLocked(false)},300);
      else if(np.length===4)setTimeout(function(){setPin("")},400);
    }
  };
  if(!locked){
    var vaultChats=[{name:"Secret Project",msg:"Documents ready",av:"🔐"},{name:"Private Notes",msg:"Account details saved",av:"📝"},{name:"Hidden Chat",msg:"Confidential conversation",av:"👤"}];
    return (<div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
      <SBar/>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 18px"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer"}}>{I.back}</button>
        <span style={{fontFamily:F,fontWeight:800,fontSize:22,color:"#a855f7"}}>Vault Chat</span>
        <button onClick={function(){setLocked(true);setPin("")}} style={{marginLeft:"auto",background:"rgba(168,85,247,0.12)",border:"none",borderRadius:8,padding:"6px 12px",fontFamily:FM,fontSize:10,color:"#a855f7",cursor:"pointer"}}>Lock</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 16px"}}>
        {vaultChats.map(function(c,i){return (<div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 12px",borderBottom:"1px solid "+C.border,animation:"su 0.3s "+i*0.1+"s both"}}>
          <div style={{width:44,height:44,borderRadius:14,background:"rgba(168,85,247,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,border:"1px solid rgba(168,85,247,0.2)"}}>{c.av}</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:F,fontWeight:600,fontSize:14,color:C.text}}>{c.name}</div>
            <div style={{fontFamily:F,fontSize:12,color:C.textDim,marginTop:2}}>{c.msg}</div>
          </div>
        </div>)})}
      </div>
      <div style={{padding:"12px 20px",background:C.card,borderTop:"1px solid "+C.border,textAlign:"center",fontFamily:F,fontSize:11,color:C.textDim}}>Hidden from recent apps · Decoy PIN shows fake screen</div>
    </div>);
  }
  return (<div style={{height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <SBar/>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 18px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer"}}>{I.back}</button>
      <span style={{fontFamily:F,fontWeight:800,fontSize:22,color:"#a855f7"}}>Vault Chat</span>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:28}}>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a855f7" strokeWidth="2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/></svg>
      <div style={{fontFamily:F,fontWeight:700,fontSize:18,color:C.text}}>Enter Vault PIN</div>
      <div style={{display:"flex",gap:14}}>
        {[0,1,2,3].map(function(i){return (<div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<pin.length?"#a855f7":"transparent",border:"2px solid "+(i<pin.length?"#a855f7":C.textMuted),transition:"all 0.15s",transform:i<pin.length?"scale(1.2)":"scale(1)"}}/>)})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginTop:8}}>
        {[1,2,3,4,5,6,7,8,9,null,0,"⌫"].map(function(n,i){return (<button key={i} onClick={function(){if(n==="⌫")setPin(pin.slice(0,-1));else if(n!==null)handleKey(String(n))}} style={{width:64,height:52,borderRadius:14,border:"none",background:n===null?"transparent":C.card,color:C.text,fontFamily:F,fontWeight:600,fontSize:n==="⌫"?18:22,cursor:n===null?"default":"pointer"}}>{n}</button>)})}
      </div>
      <div style={{fontFamily:FM,fontSize:10,color:C.textMuted,letterSpacing:1}}>Try: 1234</div>
    </div>
  </div>);
}

        <div style={{width:48,height:48,borderRadius:14,background:"rgba("+{sos:"255,59,92",walkie:"255,159,26",vault:"168,85,247",pay:"0,229,160",mesh:"59,130,246",alert:"255,59,92"}[t.key]+",0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{t.icon}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>

          <div style={{fontFamily:F,fontSize:12,color:C.textDim,marginTop:3,lineHeight:1.4}}>{t.desc}</div>

// ══════ MAIN APP ══════
function RelayApp(){
  var[screen,setScreen]=useState("splash");
  var[chat,setChat]=useState(null);
  var[myLang,setMyLang]=useState("en");
  var[picker,setPicker]=useState(false);
  var nav=function(k){if(k==="chats")setScreen("chatList");else if(k==="translate")setScreen("langSettings");else if(k==="tools")setScreen("supertools");else if(k==="sos"||k==="walkie"||k==="vault"||k==="pay"||k==="mesh"||k==="alert")setScreen(k);else setScreen("chatList")};
  return (<div style={{height:"100vh",width:"100vw",background:C.bg,overflow:"hidden",position:"relative",paddingTop:"env(safe-area-inset-top,0)"}}>
    {screen==="splash"&&<Splash onDone={function(){setScreen("chatList")}}/>}
    {screen==="chatList"&&<ChatList myLang={myLang} onSelect={function(c){setChat(c);setScreen("chat")}} onNav={nav}/>}
    {screen==="chat"&&chat&&<ChatView contact={chat} myLang={myLang} onBack={function(){setScreen("chatList")}} onOpenLP={function(){setPicker(true)}}/>}
    {screen==="langSettings"&&<LS myLang={myLang} onChange={setMyLang} onBack={nav}/>}
    {screen==="supertools"&&<SuperTools onBack={nav} onOpen={nav}/>}
    {screen==="sos"&&<SOS onBack={function(){setScreen("supertools")}}/>}
    {screen==="walkie"&&<Walkie onBack={function(){setScreen("supertools")}}/>}
    {screen==="vault"&&<Vault onBack={function(){setScreen("supertools")}}/>}
    {screen==="pay"&&<ComingSoon title="SMS Pay" icon="💸" desc="Send money via SMS — like UPI but without internet" color={C.accent} onBack={function(){setScreen("supertools")}}/>}
    {screen==="mesh"&&<ComingSoon title="Mesh Relay" icon="📡" desc="Bluetooth mesh networking — phone-to-phone when cellular fails" color={C.blue} onBack={function(){setScreen("supertools")}}/>}
    {screen==="alert"&&<ComingSoon title="Mass Alert" icon="📢" desc="Broadcast emergency alerts to thousands via SMS" color="#ff3b5c" onBack={function(){setScreen("supertools")}}/>}
    {picker&&<LP current={myLang} onSelect={function(c){setMyLang(c);setPicker(false)}} onClose={function(){setPicker(false)}}/>}
  </div>);
}
ReactDOM.render(<RelayApp/>,document.getElementById("root"));
</script>
