<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#06080c;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
::-webkit-scrollbar{width:0}
input::placeholder{color:#3e4a5c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes tb{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}

/* PWA Install Banner */
.install-banner{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#111822,#0c1018);border-top:1px solid rgba(255,255,255,0.05);padding:16px 20px;display:flex;align-items:center;gap:14;z-index:200;animation:su 0.3s ease;padding-bottom:env(safe-area-inset-bottom,16px)}
.install-banner .logo{width:44;height:44;border-radius:12px;background:linear-gradient(135deg,#00e5a0,#3b82f6);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.install-banner .info{flex:1}
.install-banner .info h3{font-size:14px;color:#e4e8f0;font-weight:700}
.install-banner .info p{font-size:11px;color:#7a8599;margin-top:2px}
.install-btn{background:linear-gradient(135deg,#00e5a0,#00b880);border:none;border-radius:12px;padding:10px 20px;color:#000;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.dismiss-btn{background:none;border:none;color:#7a8599;font-size:20px;cursor:pointer;padding:4px}

/* Safe areas */
.app-container{padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const C={
  bg:"#06080c",surface:"#0c1018",card:"#111822",
  accent:"#00e5a0",accentDark:"#00b880",accentGlow:"rgba(0,229,160,0.12)",
  blue:"#3b82f6",blueGlow:"rgba(59,130,246,0.12)",
  text:"#e4e8f0",textDim:"#7a8599",textMuted:"#3e4a5c",
  border:"rgba(255,255,255,0.05)",msgIn:"#151d2a",
};
const F="'DM Sans',sans-serif",FM="'IBM Plex Mono',monospace";

// ─── AI TRANSLATE ───
async function aiTranslate(text,targetLang){
  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),15000);
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",signal:ctrl.signal,
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        messages:[{role:"user",content:"Translate to "+targetLang+". Reply ONLY with translation, nothing else:\n\n"+text}]
      })
    });
    clearTimeout(to);
    const d=await res.json();
    return d.content?.[0]?.text?.trim()||null;
  }catch(e){clearTimeout(to);return null}
}

const langs=[
  {code:"en",name:"English",flag:"🇬🇧"},{code:"hi",name:"Hindi",flag:"🇮🇳"},
  {code:"es",name:"Spanish",flag:"🇪🇸"},{code:"fr",name:"French",flag:"🇫🇷"},
  {code:"ar",name:"Arabic",flag:"🇸🇦"},{code:"ja",name:"Japanese",flag:"🇯🇵"},
  {code:"zh",name:"Chinese",flag:"🇨🇳"},{code:"de",name:"German",flag:"🇩🇪"},
  {code:"pt",name:"Portuguese",flag:"🇧🇷"},{code:"ko",name:"Korean",flag:"🇰🇷"},
];
const GL=c=>langs.find(l=>l.code===c)||{name:c,flag:"🌐"};

const contacts=[
  {id:1,name:"Rahul Sharma",av:"RS",msg:"Bhai kal milte hain pakka!",time:"2:34 PM",unread:3,online:true,lang:"hi"},
  {id:2,name:"John Smith",av:"JS",msg:"Hey, how are you?",time:"1:15 PM",unread:1,online:true,lang:"en"},
  {id:3,name:"Carlos García",av:"CG",msg:"¡Hola amigo!",time:"12:40 PM",unread:0,online:false,lang:"es"},
  {id:4,name:"Mom ❤️",av:"MA",msg:"Khana kha liya beta?",time:"11:20 AM",unread:0,online:false,lang:"hi"},
  {id:5,name:"Yuki Tanaka",av:"YT",msg:"お疲れ様です！",time:"10:05 AM",unread:2,online:true,lang:"ja"},
  {id:6,name:"Pierre Dubois",av:"PD",msg:"Bonjour, ça va?",time:"Yesterday",unread:0,online:false,lang:"fr"},
];

// ─── SVG ICONS ───
const I={
  back:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
  send:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
  search:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  phone:<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>,
  dots:<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>,
  attach:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>,
  mic:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>,
  emoji:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>,
  signal:<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="16" width="4" height="7" rx="1"/><rect x="7" y="11" width="4" height="12" rx="1"/><rect x="13" y="6" width="4" height="17" rx="1"/><rect x="19" y="1" width="4" height="22" rx="1"/></svg>,
  check:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
  dblCheck:<svg width="15" height="12" viewBox="0 0 28 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/><polyline points="26 6 15 17 12 14"/></svg>,
  newChat:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/></svg>,
  translate:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2v3"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>,
  home:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>,
  user:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  chevDown:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>,
  x:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
};

// ─── UI COMPONENTS ───
function StatusBar(){
  const[time,setTime]=useState(new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}));
  useEffect(()=>{const i=setInterval(()=>setTime(new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true})),30000);return()=>clearInterval(i)},[]);
  return(
    <div style={{display:"flex",justifyContent:"space-between",padding:"12px 20px 4px",fontFamily:FM,fontSize:12,color:C.textDim}}>
      <span style={{fontWeight:600}}>{time}</span>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{color:C.accent}}>{I.signal}</span>
        <span style={{fontSize:9,letterSpacing:1}}>SMS</span>
      </div>
    </div>
  );
}

function Avatar({name,initials,size=48,online}){
  const cols=[["#00e5a0","#00b880"],["#3b82f6","#2563eb"],["#ff3b5c","#dc2645"],["#ff9f1a","#e68a00"],["#a855f7","#8b3fcf"],["#06b6d4","#0891b2"]];
  const i=name.charCodeAt(0)%cols.length;
  return(
    <div style={{position:"relative",flexShrink:0}}>
      <div style={{width:size,height:size,borderRadius:size*0.3,background:"linear-gradient(135deg,"+cols[i][0]+","+cols[i][1]+")",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,fontWeight:700,fontSize:size*0.34,color:"#fff"}}>{initials}</div>
      {online&&<div style={{position:"absolute",bottom:-1,right:-1,width:size*0.24,height:size*0.24,borderRadius:"50%",background:"#2ed573",border:"2.5px solid "+C.bg}}/>}
    </div>
  );
}

function Dots(){return (<div style={{display:"flex",gap:4,padding:"4px 0"}}>{[0,1,2].map(function(i){return <div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.accent,animation:"tb 1.4s "+i*0.2+"s infinite"}}/>})}</div>)}

function BNav({active,onNav}){
  const items=[{k:"chats",i:I.home,l:"Chats"},{k:"translate",i:I.translate,l:"Language"},{k:"profile",i:I.user,l:"Profile"}];
  return(
    <div style={{display:"flex",justifyContent:"space-around",padding:"10px 0 16px",background:C.surface,borderTop:"1px solid "+C.border}}>
      {items.map(function(x){return(
        <div key={x.k} onClick={function(){onNav(x.k)}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:active===x.k?C.accent:C.textMuted,cursor:"pointer"}}>
          {x.i}<span style={{fontFamily:FM,fontSize:9,letterSpacing:0.8}}>{x.l}</span>
        </div>
      )})}
    </div>
  );
}

// ─── MESSAGE BUBBLE ───
function Bubble({msg}){
  const me=msg.from==="me";
  const[showOrig,setShowOrig]=useState(true);
  const top=msg.top||msg.original;
  const diff=top!==msg.original;
  const loading=msg.translating;
  return(
    <div style={{alignSelf:me?"flex-end":"flex-start",maxWidth:"82%",animation:"fi 0.25s ease"}}>
      <div style={{padding:"11px 15px",borderRadius:me?"20px 20px 4px 20px":"20px 20px 20px 4px",background:me?"linear-gradient(135deg,"+C.accent+","+C.accentDark+")":C.msgIn,color:me?"#000":C.text,fontFamily:F,fontSize:15,lineHeight:1.5,position:"relative",overflow:"hidden"}}>
        {top}
        {loading&&<div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"linear-gradient(90deg,transparent,"+(me?"rgba(255,255,255,0.15)":"rgba(0,229,160,0.08)")+",transparent)",animation:"shimmer 1.5s infinite"}}/>}
      </div>
      {diff&&!loading&&showOrig&&(
        <div onClick={function(){setShowOrig(false)}} style={{marginTop:3,padding:"6px 12px",cursor:"pointer",borderRadius:me?"12px 12px 4px 12px":"12px 12px 12px 4px",background:me?"rgba(0,229,160,0.05)":"rgba(255,255,255,0.03)",border:"1px solid "+(me?"rgba(0,229,160,0.08)":"rgba(255,255,255,0.04)")}}>
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
            <span style={{fontFamily:FM,fontSize:8,letterSpacing:1.5,color:me?"rgba(0,229,160,0.5)":C.textMuted,opacity:0.7}}>{msg.origLabel}</span>
            <span style={{fontSize:10}}>{msg.origFlag}</span>
          </div>
          <div style={{fontFamily:F,fontSize:12,lineHeight:1.4,fontStyle:"italic",color:me?"rgba(0,229,160,0.30)":"rgba(255,255,255,0.22)"}}>{msg.original}</div>
        </div>
      )}
      {diff&&!loading&&!showOrig&&(
        <div onClick={function(){setShowOrig(true)}} style={{marginTop:2,padding:"3px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
          <div style={{width:4,height:4,borderRadius:"50%",background:C.blue,opacity:0.5}}/>
          <span style={{fontFamily:FM,fontSize:8,color:C.textMuted,letterSpacing:1}}>SHOW ORIGINAL</span>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",gap:3,marginTop:3,justifyContent:me?"flex-end":"flex-start",padding:"0 4px"}}>
        <span style={{fontFamily:FM,fontSize:9,color:C.textMuted}}>{msg.time}</span>
        {me&&<span style={{color:msg.status==="read"?C.accent:C.textMuted}}>{msg.status==="read"?I.dblCheck:I.check}</span>}
        {diff&&!loading&&<span style={{fontFamily:FM,fontSize:8,color:C.blue,opacity:0.6,marginLeft:2}}>translated</span>}
        {loading&&<span style={{fontFamily:FM,fontSize:8,color:C.accent,opacity:0.6,marginLeft:2}}>translating...</span>}
      </div>
    </div>
  );
}

// ─── SPLASH ───
function Splash({onDone}){
  const[p,setP]=useState(0);
  useEffect(function(){var a=setTimeout(function(){setP(1)},300),b=setTimeout(function(){setP(2)},1000),c=setTimeout(onDone,2400);return function(){clearTimeout(a);clearTimeout(b);clearTimeout(c)}},[]);
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg,position:"relative"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(circle at 50% 35%,"+C.accentGlow+" 0%,transparent 55%)"}}/>
      <div style={{width:90,height:90,borderRadius:24,background:"linear-gradient(135deg,"+C.accent+","+C.blue+")",display:"flex",alignItems:"center",justifyContent:"center",opacity:p>=1?1:0,transform:p>=1?"scale(1)":"scale(0.4)",transition:"all 0.7s cubic-bezier(0.34,1.56,0.64,1)",boxShadow:"0 0 60px "+C.accentGlow}}>
        <svg width="44" height="44" viewBox="0 0 24 24" fill="white"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </div>
      <div style={{marginTop:28,fontFamily:F,fontWeight:900,fontSize:38,letterSpacing:8,color:C.text,opacity:p>=1?1:0,transition:"all 0.5s ease 0.15s"}}>RELAY</div>
      <div style={{marginTop:12,fontFamily:FM,fontSize:12,letterSpacing:4,color:C.accent,opacity:p>=2?1:0,transition:"all 0.4s"}}>AI-POWERED TRANSLATION</div>
      <div style={{position:"absolute",bottom:60,fontFamily:FM,fontSize:10,color:C.textMuted,opacity:p>=2?1:0,transition:"opacity 0.4s",display:"flex",alignItems:"center",gap:6}}>
        <span style={{color:C.accent}}>{I.signal}</span> CELLULAR POWERED · E2E ENCRYPTED
      </div>
    </div>
  );
}

// ─── CHAT VIEW ───
function ChatView({contact,myLang,onBack,onOpenLP}){
  const[msg,setMsg]=useState("");
  const[msgs,setMsgs]=useState([]);
  const[typing,setTyping]=useState(false);
  const ref=useRef(null);
  const idRef=useRef(0);
  const tl=contact.lang;
  const myL=GL(myLang),thL=GL(tl);
  var nid=function(){return ++idRef.current};

  var doTranslate=useCallback(async function(id,text,targetLangName){
    var result=await aiTranslate(text,targetLangName);
    if(result){setMsgs(function(prev){return prev.map(function(m){return m.id===id?Object.assign({},m,{top:result,translating:false}):m})})}
    else{setMsgs(function(prev){return prev.map(function(m){return m.id===id?Object.assign({},m,{translating:false}):m})})}
  },[]);

  useEffect(function(){
    idRef.current=0;
    var seed=[
      {id:nid(),from:"them",time:"2:20 PM",original:"Bhai kal milte hain pakka!",top:"Bhai kal milte hain pakka!",translating:true,origLabel:"ORIGINAL "+thL.name.toUpperCase(),origFlag:thL.flag},
      {id:nid(),from:"me",time:"2:22 PM",status:"read",original:"Haan bro, pakka! 6 baje chalte hain",top:"Haan bro, pakka! 6 baje chalte hain",translating:true,origLabel:"YOU TYPED",origFlag:"🇮🇳"},
      {id:nid(),from:"them",time:"2:25 PM",original:"Sahi hai 🔥 Main bike se aaunga",top:"Sahi hai 🔥 Main bike se aaunga",translating:true,origLabel:"ORIGINAL "+thL.name.toUpperCase(),origFlag:thL.flag},
      {id:nid(),from:"me",time:"2:28 PM",status:"delivered",original:"Theek hai, metro pe mil jaayenge",top:"Theek hai, metro pe mil jaayenge",translating:true,origLabel:"YOU TYPED",origFlag:"🇮🇳"},
      {id:nid(),from:"them",time:"2:30 PM",original:"Done! Aur project ka kya hua?",top:"Done! Aur project ka kya hua?",translating:true,origLabel:"ORIGINAL "+thL.name.toUpperCase(),origFlag:thL.flag},
    ];
    setMsgs(seed);
    seed.forEach(function(m){doTranslate(m.id,m.original,myL.name)});
  },[myLang,tl]);

  useEffect(function(){if(ref.current)ref.current.scrollIntoView({behavior:"smooth"})},[msgs,typing]);

  var send=function(){
    if(!msg.trim())return;
    var orig=msg.trim();
    var now=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
    var id=nid();
    var newMsg={id:id,from:"me",time:now,status:"sent",original:orig,top:orig,translating:true,origLabel:"YOU TYPED",origFlag:GL(myLang).flag};
    setMsgs(function(p){return p.concat([newMsg])});
    setMsg("");
    doTranslate(id,orig,myL.name);
    setTyping(true);
    setTimeout(function(){
      setTyping(false);
      var replies={hi:"Bahut badiya bhai! Maza aa gaya sunke.",en:"That's awesome! Really glad to hear that.",es:"¡Eso es genial!",fr:"C'est super!",ja:"それは素晴らしい！"};
      var reply=replies[tl]||replies.en;
      var rt=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
      var rid=nid();
      setMsgs(function(p){return p.concat([{id:rid,from:"them",time:rt,original:reply,top:reply,translating:true,origLabel:"ORIGINAL "+thL.name.toUpperCase(),origFlag:thL.flag}])});
      doTranslate(rid,reply,myL.name);
    },2500);
  };

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <StatusBar/>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 16px 12px",borderBottom:"1px solid "+C.border,background:C.surface}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",padding:4}}>{I.back}</button>
        <Avatar name={contact.name} initials={contact.av} size={40} online={contact.online}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:F,fontWeight:700,fontSize:16,color:C.text}}>{contact.name}</div>
          <div style={{fontFamily:FM,fontSize:10,color:contact.online?"#2ed573":C.textMuted}}>{contact.online?"online · speaks "+thL.name:"last seen 5m ago"}</div>
        </div>
        <button onClick={onOpenLP} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 12px",background:C.blueGlow,borderRadius:20,border:"1px solid rgba(59,130,246,0.2)",cursor:"pointer"}}>
          <span style={{fontSize:13}}>{thL.flag}</span><span style={{color:C.blue,fontSize:11}}>⇄</span><span style={{fontSize:13}}>{myL.flag}</span>

      </div>
      <div style={{textAlign:"center",padding:"7px 10px",background:"linear-gradient(90deg,transparent,"+C.blueGlow+",transparent)"}}>

      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px",display:"flex",flexDirection:"column",gap:8}}>
        {msgs.map(function(m){return <Bubble key={m.id} msg={m}/>})}

        <div ref={ref}/>

      <div style={{background:C.surface,borderTop:"1px solid "+C.border}}>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"7px 16px 0"}}>
          <span style={{fontSize:12}}>✍️</span>
          <span style={{fontFamily:FM,fontSize:9,color:C.textDim,letterSpacing:1}}>TYPE IN ANY LANGUAGE</span>
          <span style={{color:C.textMuted}}>→</span>
          <span style={{fontFamily:FM,fontSize:9,color:C.blue,letterSpacing:1}}>AI TRANSLATES TO {myL.name.toUpperCase()} {myL.flag}</span>
        </div>
        <div style={{padding:"8px 14px 16px",display:"flex",alignItems:"flex-end",gap:10}}>
          <button style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",padding:4}}>{I.emoji}</button>
          <div style={{flex:1,background:C.card,borderRadius:24,padding:"11px 16px",display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.border}}>
            <input value={msg} onChange={function(e){setMsg(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")send()}} placeholder="Type in any language..." style={{background:"none",border:"none",outline:"none",color:C.text,fontFamily:F,fontSize:15,width:"100%"}}/>
            <span style={{color:C.textMuted,cursor:"pointer"}}>{I.attach}</span>
          </div>
          <button onClick={send} style={{width:44,height:44,borderRadius:14,background:msg.trim()?"linear-gradient(135deg,"+C.accent+","+C.blue+")":C.card,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:msg.trim()?"#fff":C.textMuted,transition:"all 0.2s"}}>{msg.trim()?I.send:I.mic}</button>
        </div>
      </div>
    </div>
  );
}

// ─── CHAT LIST ───
function ChatList({myLang,onSelect,onNav}){
  const[search,setSearch]=useState("");
  const[so,setSo]=useState(false);
  const[tp,setTp]=useState({});
  var filtered=contacts.filter(function(c){return c.name.toLowerCase().includes(search.toLowerCase())});
  var myL=GL(myLang);
  useEffect(function(){contacts.forEach(async function(c){if(c.lang!==myLang){var t=await aiTranslate(c.msg,myL.name);if(t)setTp(function(p){var n={};Object.assign(n,p);n[c.id]=t;return n})}})},[myLang]);
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <StatusBar/>
      <div style={{padding:"8px 20px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:F,fontWeight:900,fontSize:28,color:C.text}}>RELAY</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <div style={{display:"inline-flex",alignItems:"center",gap:5,background:C.accentGlow,padding:"3px 12px",borderRadius:20}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:C.accent,animation:"pulse 2s infinite"}}/>
                <span style={{fontFamily:FM,fontSize:10,color:C.accent,letterSpacing:1.5}}>CELLULAR</span>
              </div>
              <div onClick={function(){onNav("translate")}} style={{display:"inline-flex",alignItems:"center",gap:4,background:C.blueGlow,padding:"3px 12px",borderRadius:20,cursor:"pointer",border:"1px solid rgba(59,130,246,0.15)"}}>
                <span style={{fontSize:13}}>{myL.flag}</span>
                <span style={{fontFamily:FM,fontSize:10,color:C.blue,letterSpacing:1}}>{myL.name.toUpperCase()}</span>
                {I.chevDown}
              </div>
            </div>
          </div>
          <button onClick={function(){setSo(!so)}} style={{background:so?C.accentGlow:C.card,border:"none",borderRadius:12,padding:10,color:so?C.accent:C.textDim,cursor:"pointer"}}>{I.search}</button>
        </div>
        {so&&<div style={{marginTop:10,background:C.card,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.border}}>
          <span style={{color:C.textMuted}}>{I.search}</span>
          <input autoFocus value={search} onChange={function(e){setSearch(e.target.value)}} placeholder="Search..." style={{background:"none",border:"none",outline:"none",color:C.text,fontFamily:F,fontSize:14,width:"100%"}}/>
        </div>}
      </div>
      <div style={{margin:"0 16px 10px",padding:"12px 16px",borderRadius:16,background:"linear-gradient(135deg,"+C.blueGlow+","+C.accentGlow+")",border:"1px solid rgba(59,130,246,0.1)",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:20}}>🤖</span>
        <div style={{flex:1}}>
          <div style={{fontFamily:F,fontWeight:600,fontSize:13,color:C.text}}>AI Translation Active</div>
          <div style={{fontFamily:F,fontSize:11,color:C.textDim,marginTop:2}}>Powered by Claude · {myL.name} {myL.flag}</div>
        </div>
        <button onClick={function(){onNav("translate")}} style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"6px 12px",fontFamily:FM,fontSize:10,color:C.blue,cursor:"pointer"}}>Change</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 12px"}}>
        {filtered.map(function(c,i){
          var f=GL(c.lang).flag,t=tp[c.id],d=t&&t!==c.msg;
          return(
            <div key={c.id} onClick={function(){onSelect(c)}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 12px",borderRadius:16,cursor:"pointer",borderBottom:"1px solid "+C.border,animation:"su 0.25s "+i*0.04+"s both"}}>
              <Avatar name={c.name} initials={c.av} size={50} online={c.online}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontFamily:F,fontWeight:600,fontSize:15,color:C.text}}>{c.name}</span>
                    <span style={{fontSize:13}}>{f}</span>
                  </div>
                  <span style={{fontFamily:FM,fontSize:10,color:c.unread?C.accent:C.textMuted}}>{c.time}</span>
                </div>
                <div style={{marginTop:4}}>
                  <div style={{fontFamily:F,fontSize:13,color:C.textDim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t||c.msg}</div>
                  {d&&<div style={{fontFamily:F,fontSize:11,color:C.textMuted,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2,opacity:0.5}}>{c.msg}</div>}
                </div>
              </div>
              {c.unread>0&&<div style={{minWidth:20,height:20,borderRadius:10,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FM,fontSize:10,fontWeight:700,color:"#000",padding:"0 6px"}}>{c.unread}</div>}
            </div>
          );
        })}
      </div>
      <button style={{position:"absolute",bottom:80,right:20,width:56,height:56,borderRadius:18,background:"linear-gradient(135deg,"+C.accent+","+C.blue+")",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 24px "+C.accentGlow,color:"#fff"}}>{I.newChat}</button>
      <BNav active="chats" onNav={onNav}/>
    </div>
  );
}

// ─── LANG SETTINGS ───

        <button onClick={function(){onBack("chats")}} style={{background:"none",border:"none",color:C.accent,cursor:"pointer"}}>{I.back}</button>
        <span style={{fontFamily:F,fontWeight:800,fontSize:22,color:C.text}}>Translation</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 16px 100px"}}>
        <div style={{padding:24,borderRadius:20,textAlign:"center",marginBottom:16,background:"linear-gradient(135deg,"+C.blueGlow+","+C.accentGlow+")",border:"1px solid rgba(59,130,246,0.15)"}}>

          <div key={l.code} onClick={function(){onChange(l.code)}} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:14,cursor:"pointer",marginBottom:4,background:a?C.accentGlow:C.card,border:"1px solid "+(a?C.accent+"33":C.border)}}>
            <span style={{fontSize:26}}>{l.flag}</span>
            <span style={{flex:1,fontFamily:F,fontWeight:600,fontSize:15,color:a?C.accent:C.text}}>{l.name}</span>

}

// ─── LANG PICKER ───
function LP({current,onSelect,onClose}){
  const[s,setS]=useState("");
  var fl=langs.filter(function(l){return l.name.toLowerCase().includes(s.toLowerCase())});
  return(
    <div style={{position:"absolute",inset:0,zIndex:100,background:"rgba(0,0,0,0.9)",backdropFilter:"blur(10px)",display:"flex",flexDirection:"column",animation:"fi 0.25s"}}>
      <div style={{padding:"60px 20px 12px",display:"flex",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:F,fontWeight:800,fontSize:24,color:C.text}}>Your Language</div>
          <div style={{fontFamily:F,fontSize:13,color:C.textDim,marginTop:4}}>AI translates chats to this</div>
        </div>
        <button onClick={onClose} style={{background:C.card,border:"none",borderRadius:12,padding:10,color:C.textDim,cursor:"pointer"}}>{I.x}</button>
      </div>
      <div style={{padding:"0 20px 12px"}}>
        <div style={{background:C.card,borderRadius:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,border:"1px solid "+C.border}}>
          <span style={{color:C.textMuted}}>{I.search}</span>
          <input autoFocus value={s} onChange={function(e){setS(e.target.value)}} placeholder="Search language..." style={{background:"none",border:"none",outline:"none",color:C.text,fontFamily:F,fontSize:15,width:"100%"}}/>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px"}}>
        {fl.map(function(l,i){var a=current===l.code;return(
          <div key={l.code} onClick={function(){onSelect(l.code)}} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 16px",borderRadius:16,cursor:"pointer",marginBottom:4,background:a?C.accentGlow:"transparent",border:a?"1px solid "+C.accent+"33":"1px solid transparent",animation:"su 0.25s "+i*0.03+"s both"}}>
            <span style={{fontSize:30}}>{l.flag}</span>
            <span style={{flex:1,fontFamily:F,fontWeight:600,fontSize:16,color:a?C.accent:C.text}}>{l.name}</span>
            {a&&<div style={{width:26,height:26,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>}
          </div>
        )})}
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function RelayApp(){
  const[screen,setScreen]=useState("splash");
  const[chat,setChat]=useState(null);
  const[myLang,setMyLang]=useState("en");
  const[picker,setPicker]=useState(false);
  var nav=function(k){if(k==="chats")setScreen("chatList");else if(k==="translate")setScreen("langSettings");else setScreen("chatList")};
  return(
    <div className="app-container" style={{height:"100vh",width:"100vw",background:C.bg,overflow:"hidden",position:"relative"}}>
      {screen==="splash"&&<Splash onDone={function(){setScreen("chatList")}}/>}
      {screen==="chatList"&&<ChatList myLang={myLang} onSelect={function(c){setChat(c);setScreen("chat")}} onNav={nav}/>}
      {screen==="chat"&&chat&&<ChatView contact={chat} myLang={myLang} onBack={function(){setScreen("chatList")}} onOpenLP={function(){setPicker(true)}}/>}
      {screen==="langSettings"&&<LS myLang={myLang} onChange={setMyLang} onBack={nav}/>}
      {picker&&<LP current={myLang} onSelect={function(c){setMyLang(c);setPicker(false)}} onClose={function(){setPicker(false)}}/>}
    </div>
  );
}

ReactDOM.render(<RelayApp/>, document.getElementById("root"));
</script>

// ─── PWA INSTALL PROMPT ───
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  var banner = document.getElementById('install-banner');
  if(banner) banner.style.display = 'flex';
});
function installPWA() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(result) {
      deferredPrompt = null;
      var banner = document.getElementById('install-banner');
      if(banner) banner.style.display = 'none';
    });
  }
}
function dismissBanner() {
  var banner = document.getElementById('install-banner');
  if(banner) banner.style.display = 'none';
}
</script>

<!-- Install Banner -->
<div id="install-banner" class="install-banner" style="display:none">
  <div class="logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
  <div class="info"><h3>Install RELAY</h3><p>Add to home screen for full app experience</p></div>
  <button class="install-btn" onclick="installPWA()">Install</button>
  <button class="dismiss-btn" onclick="dismissBanner()">✕</button>
</div>
